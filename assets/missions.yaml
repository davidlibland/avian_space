# ── Basic tutorial ────────────────────────────────────────────────────────────
# Auto-starting chain for new pilots: flight → landing → jumping → trading.
# Each stage auto-starts when the previous completes; ABANDONING any stage
# (mission log, I) ends the whole tutorial — the rest stays locked forever,
# which is the intended exit for experienced pilots.
tutorial_flight:
  briefing: "Flight check, pilot. Thrust with UP, turn with LEFT/RIGHT, and hold DOWN to flip for a braking burn. Now find the ground: cycle planet targets with [ and ], select Earth, hold A — the intercept autopilot — and press L when close to request docking. (F1 shows every control.)"
  success_text: "Clean approach, clean landing."
  failure_text: "Tutorial ended. You clearly know your way around a cockpit — the rest of the course stands down."
  preconditions: []
  offer:
    kind: auto
  objective:
    kind: land_on_planet
    planet: earth
  completion_effects:
  - kind: pay
    credits: 300
tutorial_mining:
  briefing: "Welcome to the ground: walk with WASD and press E to enter buildings. Stop by the OUTFITTER and buy a Laser — rocks are money. Then lift off and press Q to target the nearest asteroid: hold A to auto-aim and press SPACE to break it up. Press P to target the iron in the debris, then hold A and UP and the autopilot flies the scoop — 2 units and you're done."
  success_text: "Ore in the hold. Sell it at any market — every planet pays its own price."
  failure_text: "Tutorial ended. The asteroids will keep."
  preconditions:
  - kind: completed
    mission: tutorial_flight
  offer:
    kind: auto
  objective:
    kind: collect_pickups
    commodity: iron
    system: sol
    quantity: 2
  completion_effects:
  - kind: pay
    credits: 200
tutorial_jump:
  briefing: "Let's leave the system. Fuel is jumps — top up at the FUEL STATION when landed. In space, press J to open the star map, pick BARNARD, and confirm. The flash does the rest."
  success_text: "Welcome to Barnard. New system, new prices, new faces."
  failure_text: "Tutorial ended. The stars aren't going anywhere."
  preconditions:
  - kind: completed
    mission: tutorial_mining
  offer:
    kind: auto
  objective:
    kind: travel_to_system
    system: barnard
  completion_effects:
  - kind: pay
    credits: 300
tutorial_trade:
  briefing: "Last lesson: money. Land on Barnard Rock and open the market — the price tags read cheap or expensive against the galactic average. Buy what's cheap here, sell it where it's dear, and shift-click to trade in bulk. Your mission log is I; missions find you in bars and markets."
  success_text: "That's the whole game, pilot: fly, fight, haul, and choose your friends carefully. A dockworker on Earth is already looking for a pilot like you."
  failure_text: "Tutorial ended. The market will miss you."
  preconditions:
  - kind: completed
    mission: tutorial_jump
  offer:
    kind: auto
  objective:
    kind: land_on_planet
    planet: barnard_rock
  completion_effects:
  - kind: pay
    credits: 500

deliver_wheat_intro:
  briefing: "A dockworker sprints toward you from the market stalls, out of breath. 'Thank god — a pilot. Mars colony is starving. 10 units of food need to get there yesterday. You take it, we pay on delivery. Please.'"
  success_text: "The governor claps you on the shoulder. The grain is already being unloaded."
  failure_text: "Word travels fast. Mars will be looking for a different pilot next time."
  preconditions: []
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: market
    approach: seek
  start_effects:
    - kind: load_cargo
      commodity: food
      quantity: 10
      reserved: true
  objective:
    kind: land_on_planet
    planet: mars
  requires:
    - kind: has_cargo
      commodity: food
      quantity: 10
  completion_effects:
    - kind: remove_cargo
      commodity: food
      quantity: 10
    - kind: pay
      credits: 600

scavenge_iron:
  briefing: "A grizzled prospector leans against the mechanic shop wall, chewing something. 'Need 5 units of iron — clean stuff, pulled from the asteroid fields in Sol. No market-bought slag. Bring it back to Earth and I'll make it worth your time.'"
  success_text: "You've got the ore. Head back to Earth to collect your pay."
  failure_text: "Deal's off."
  preconditions:
    - kind: completed
      mission: deliver_wheat_intro
  offer:
    kind: npc_offer
    planet: mars
    weight: 0.5
    building: mechanicshop
  objective:
    kind: collect_pickups
    commodity: iron
    system: sol
    quantity: 5

scavenge_iron_deliver:
  briefing: "Deliver the iron to the prospector on Earth."
  success_text: "The prospector weighs the ore in one hand and nods. 'That's the real thing.'"
  failure_text: "The prospector is long gone by the time you check back in."
  preconditions:
    - kind: completed
      mission: scavenge_iron
  offer:
    kind: auto
  objective:
    kind: land_on_planet
    planet: earth
  requires:
    - kind: has_cargo
      commodity: iron
      quantity: 5
  completion_effects:
    - kind: remove_cargo
      commodity: iron
      quantity: 5
    - kind: pay
      credits: 900

# ── Mining Guild storyline ─────────────────────────────────────────────────
# Three escalating collect-iron missions that introduce the player to
# asteroid mining across the Federation core and border systems. The final
# stage grants the mining license (unlocks the asteroid_miner in shipyards)
# plus an ongoing mining-template unlock so paid mining contracts keep
# showing up in the bar.

mining_story_1:
  faction: Merchant
  briefing: "A weather-beaten Mining Guild recruiter loiters near the shipyard, eyeing incoming pilots. She waves you over. 'Kid, we're short on haulers. Shoot up some asteroids around Sol and bring back 4 units of clean iron — no market-bought slag. 1,500 credits. Find me at the Mars market when you're done.'"
  success_text: "The recruiter looks impressed. 'Go see the foreman on Mars — she's got bigger work.'"
  failure_text: "The recruiter snorts. 'Don't waste my time again.'"
  preconditions: []
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: shipyard
    npc: guild_recruiter
  objective:
    kind: collect_pickups
    commodity: iron
    system: sol
    quantity: 4
  completion_effects:
    - kind: pay
      credits: 1500

mining_story_2:
  faction: Merchant
  briefing: "The foreman is checking cargo manifests outside the Mars market. She pushes a datapad across a crate toward you. '6 units of iron, pulled from the Tau Ceti belt. Federation space, but further out — you'll need to jump. 3,000 on delivery. Come see our frontier contact at Barnard Rock when you make it back.'"
  success_text: "The foreman nods. 'Frontier work pays the best. Barnard Rock — ask for the Guild near the market.'"
  failure_text: "The foreman just shakes her head."
  preconditions:
    - kind: completed
      mission: mining_story_1
  offer:
    kind: npc_offer
    planet: mars
    weight: 1.0
    building: market
    npc: guild_foreman
  objective:
    kind: collect_pickups
    commodity: iron
    system: tau_ceti
    quantity: 6
  completion_effects:
    - kind: pay
      credits: 3000

mining_story_3:
  faction: Merchant
  briefing: "A wiry Guild agent waits outside the Barnard Rock market, arms folded. 'Border work. 8 units of clean iron, pulled from the Barnard belt. Rebels and pirates both sweep through here, so keep your eyes open. 6,000 credits — and if you make it back, you'll have earned your Miner's Guild certification. Real mining contracts will start showing up after that.'"
  success_text: "The agent slides a signed certification across the counter: 'You're Guild now. Check any bar for mining contracts.' Your ship computer registers the new licenses."
  failure_text: "The agent sighs. 'The border eats the unprepared.'"
  preconditions:
    - kind: completed
      mission: mining_story_2
  offer:
    kind: npc_offer
    planet: barnard_rock
    weight: 1.0
    building: market
    npc: guild_agent
  objective:
    kind: collect_pickups
    commodity: iron
    system: barnard
    quantity: 8
  completion_effects:
    - kind: pay
      credits: 6000
    - kind: grant_unlock
      name: mining_license
    - kind: grant_unlock
      name: mining_templates_unlocked

# ── Merchant Guild storyline ───────────────────────────────────────────────
# Three escalating delivery missions that introduce the player to the
# Merchant Guild's three cargo-ship tiers. Each stage pays roughly the
# price of the next ship up and grants its license, creating a natural
# upgrade path: shuttle → freighter → hauler → bulk_carrier.

merchant_story_1:
  faction: Merchant
  briefing: "A Merchant Guild rep is haggling with a vendor near the market. He spots you and breaks away. 'You look like you need work. Short run — 8 units of food to Moon colony. Good shakedown for a new pilot. 7,000 on delivery, and we'll get you certified for a real cargo ship. Come find me at Moon's market when it's done.'"
  success_text: "The rep on Moon hands over the credits and a certification chit. 'Freighter license. Spend wisely. Come find me at the market for the next run.'"
  failure_text: "The rep shrugs. 'The Guild's got other pilots.'"
  preconditions: []
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: market
    npc: merchant_rep
  start_effects:
    - kind: load_cargo
      commodity: food
      quantity: 8
      reserved: true
  objective:
    kind: land_on_planet
    planet: moon
  requires:
    - kind: has_cargo
      commodity: food
      quantity: 8
  completion_effects:
    - kind: remove_cargo
      commodity: food
      quantity: 8
    - kind: pay
      credits: 7000
    - kind: grant_unlock
      name: merchant_freighter_license

merchant_story_2:
  faction: Merchant
  briefing: "The Guild rep is leaning against a stack of crates outside the Moon market. He waves you over with a manifest. 'Bigger run this time — 50 units of food out to tau_ceti_2, one jump from Sol. You'll want a freighter for this one. 9,000 on delivery. When it's done, head to the tau_ceti_2 market — the Guild's regional office is there.'"
  success_text: "The regional manager signs off the shipment and hands you a hauler license: 'Good run. We've got one more contract for you. Come back when you're ready.'"
  failure_text: "The regional manager's disappointment is palpable."
  preconditions:
    - kind: completed
      mission: merchant_story_1
  offer:
    kind: npc_offer
    planet: moon
    weight: 1.0
    building: market
    npc: merchant_rep
  start_effects:
    - kind: load_cargo
      commodity: food
      quantity: 40
      reserved: true
  objective:
    kind: land_on_planet
    planet: tau_ceti_2
  requires:
    - kind: has_cargo
      commodity: food
      quantity: 40
  completion_effects:
    - kind: remove_cargo
      commodity: food
      quantity: 40
    - kind: pay
      credits: 9000
    - kind: grant_unlock
      name: merchant_hauler_license

merchant_story_3:
  faction: Merchant
  briefing: "The regional manager is reviewing shipments outside the tau_ceti_2 market. She unrolls a long-haul contract. '75 units of food to kepler_22b, deep in Federation space. Long jumps. You'll need a hauler for this — anything smaller and the cargo won't fit. 12,000 credits, and we'll certify you for the biggest ships the Guild sells.'"
  success_text: "The kepler_22b quartermaster confirms receipt. 'You're one of ours now. Bulk carrier license is yours — if you can afford one.'"
  failure_text: "The contract is voided."
  preconditions:
    - kind: completed
      mission: merchant_story_2
  offer:
    kind: npc_offer
    planet: tau_ceti_2
    weight: 1.0
    building: market
    npc: merchant_manager
  start_effects:
    - kind: load_cargo
      commodity: food
      quantity: 75
      reserved: true
  objective:
    kind: land_on_planet
    planet: kepler_22b
  requires:
    - kind: has_cargo
      commodity: food
      quantity: 75
  completion_effects:
    - kind: remove_cargo
      commodity: food
      quantity: 75
    - kind: pay
      credits: 12000
    - kind: grant_unlock
      name: merchant_bulk_license

# ── Bounty: Sol pirate ─────────────────────────────────────────────────────

pirate_bounty_sol:
  faction: Federation
  briefing: "A Federation officer jogs over from the shipyard, waving you down. 'Pilot — we need you. There's a pirate corvette tearing through merchant convoys in Sol. Weak ship, but they've hit three transports this week alone. Destroy them — 9,000 credits, enough to pick up a fighter if that's your thing.'"
  success_text: "As the corvette breaks apart, your sensors pick up a faint thruster signature — an escape pod, accelerating hard toward the outer system. The officer's voice crackles over comms: 'Don't let them disappear. Our intel says the pod is heading for Triton. Land there and apprehend the pirate before they find a new ship.'"
  failure_text: "The officer shakes her head. 'They got away. Maybe next time.'"
  preconditions: []
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: shipyard
    approach: seek
  objective:
    kind: destroy_ships
    system: sol
    ship_type: pirate_corvette
    count: 1
    target_name: Notorious Pirate
    hostile: true
  completion_effects:
    - kind: pay
      credits: 9000

pirate_escape_pod:
  faction: Federation
  briefing: "Land on Triton (in sol) and apprehend the pirate before they find a new ship."
  success_text: "You corner the pirate in a frozen alley on Triton. They raise their hands. 'Alright, alright. You got me.' The Federation transfers 6,000 credits and a fighter certification to your account — the debrief confirmed this pirate had been scouting Federation convoys for months."
  failure_text: "The pirate slipped away in the ice fields. They'll be someone else's problem now."
  preconditions:
    - kind: completed
      mission: pirate_bounty_sol
  offer:
    kind: auto
  start_effects: []
  objective:
    kind: catch_npc
    planet: triton
    npc_name: "the escaped pirate"
    building: bar
  completion_effects:
    - kind: pay
      credits: 6000
    - kind: grant_unlock
      name: fighter_license

# ── Bounty Hunter storyline ────────────────────────────────────────────────
# Escalating combat missions that unlock the corvette, frigate, and IR
# missiles. Starts at Earth shipyard (Sol), moves outward through
# progressively dangerous systems. Completing the full arc grants
# bounty_hunter_license which unlocks ongoing random bounty templates in
# any bar.

# Phase 1: Corvette path (2 missions, pays ~18k each → corvette costs 18k)

bounty_story_1:
  faction: Federation
  briefing: "The Federation officer from last time intercepts you near the Earth shipyard. 'Nice work with that pirate. We've got reports of two more pirate corvettes raiding convoys near Alpha Centauri. Dangerous space — no planets, thick asteroid fields. Take them out — 8,000 credits. Come find me here when it's done.'"
  success_text: "The officer nods. 'Alpha Centauri is a little safer tonight. 8,000 credits. Come back — we've got one more job before we can certify you for a real combat ship.'"
  failure_text: "The officer grimaces. 'Those pirates are still out there.'"
  preconditions:
    - kind: completed
      mission: pirate_bounty_sol
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: shipyard
    approach: seek
    npc: officer_vasquez
  objective:
    kind: destroy_ships
    system: alpha_centauri
    ship_type: pirate_corvette
    count: 2
    target_name: Pirate Raiders
    hostile: true
  completion_effects:
    - kind: pay
      credits: 8000

bounty_story_2:
  faction: Federation
  briefing: "The officer catches you outside the shipyard, datapad in hand. 'A pirate missile boat has been ambushing freighters in the Drift. Heavy hitter — mines and missiles both. Destroy it and we can start your path to corvette-class certification. 9,000 credits on top.'"
  success_text: "As the missile boat cracks open, an encrypted distress call spikes across the comms — a senior pirate captain, coordinating raids from the ground. The Federation officer comes on: 'That voice. We know him. He's gone to ground on Titan. Run him down before he regroups.'"
  failure_text: "The officer shakes her head. 'That missile boat is still out there.'"
  preconditions:
    - kind: completed
      mission: bounty_story_1
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: shipyard
    approach: seek
    npc: officer_vasquez
  objective:
    kind: destroy_ships
    system: drift
    ship_type: pirate_missile_boat
    count: 1
    target_name: Pirate Missile Boat
    hostile: true
  completion_effects:
    - kind: pay
      credits: 9000

bounty_story_2_catch:
  faction: Federation
  briefing: "The pirate captain is hiding in Titan's smog-choked dockside quarter. Find him before he slips offworld — our intel says he's trying to buy passage out of a bar."
  success_text: "You pin the captain against a bulkhead in a back-alley bar. He spits, but surrenders. The Federation uploads the corvette certification and proton-beam clearance to your ship the moment he's in custody. 7,000 credits too. Vasquez at Barnard Station has the next tier whenever you're ready."
  failure_text: "The captain vanished into Titan's underlayer. He'll be running a new crew within a month."
  preconditions:
    - kind: completed
      mission: bounty_story_2
  offer:
    kind: auto
  objective:
    kind: catch_npc
    planet: titan
    npc_name: "the pirate captain"
    building: bar
  completion_effects:
    - kind: pay
      credits: 7000
    - kind: grant_unlock
      name: corvette_license
    - kind: grant_unlock
      name: proton_beam_license

# Phase 2: Frigate path (2 missions, pays ~60k each → frigate costs 120k)

bounty_story_3:
  faction: Federation
  briefing: "Captain Vasquez is inspecting a damaged hull outside the Barnard Station mechanic shop. She sizes you up. 'You've got a reputation now. We've tracked a pirate strike group — two missile boats — operating out of the Drift. Border space, no backup. 22,000 credits if you eliminate them both. Report back here when it's done.'"
  success_text: "Vasquez stamps your record. 'Impressive. One more target and you'll have earned a frigate certification — and access to Federation IR missiles. Come find me at the mechanic shop.'"
  failure_text: "Vasquez says nothing. The dossier stays on the table."
  preconditions:
    - kind: completed
      mission: bounty_story_2_catch
  offer:
    kind: npc_offer
    planet: barnard_station
    weight: 1.0
    building: mechanicshop
    approach: seek
    npc: officer_vasquez
  objective:
    kind: destroy_ships
    system: drift
    ship_type: pirate_missile_boat
    count: 2
    target_name: Pirate Strike Group
    hostile: true
  completion_effects:
    - kind: pay
      credits: 22000

bounty_story_4:
  faction: Federation
  briefing: "Vasquez strides over from the mechanic shop, urgency in her step. 'This is the big one. Three pirate missile boats have set up a forward base in Alpha Centauri — dug in among the asteroid fields. Take all three out and we can move you up to frigate-class. 26,000 credits. And after this, the bounty board will keep you busy. Good hunting.'"
  success_text: "Vasquez reviews the combat data. 'Clean work. But — one of the boats launched a lifeboat just before it broke up. Our tracker says it burned for Barnard Rock. That's the pirate ring's commander. Get to him before local sympathizers hide him away.'"
  failure_text: "Vasquez stares at the tactical display. 'They're still operational.'"
  preconditions:
    - kind: completed
      mission: bounty_story_3
  offer:
    kind: npc_offer
    planet: barnard_station
    weight: 1.0
    building: shipyard
    approach: seek
    npc: officer_vasquez
  objective:
    kind: destroy_ships
    system: alpha_centauri
    ship_type: pirate_missile_boat
    count: 3
    target_name: Pirate Forward Base
    hostile: true
  completion_effects:
    - kind: pay
      credits: 26000

bounty_story_4_catch:
  faction: Federation
  briefing: "The pirate commander fled to Barnard Rock. Our informants say he's bribing a mechanic to swap transponders on a hauler. Find him at the mechanic shop before he lifts off under a new name."
  success_text: "You catch the commander crouched behind a coolant rig, half-disguised in mechanic's coveralls. He laughs bitterly: 'You got me.' The Federation's response is immediate — frigate certification, Federation IR missile clearance, and full bounty-hunter accreditation all land on your file. 11,000 credits on top. 'Commander, you're one of ours now,' Vasquez says. 'The bounty board has a standing contract for you — check it any time.'"
  failure_text: "The commander's transponder vanished from our scopes an hour later. He's already on another ship, halfway to the Drift."
  preconditions:
    - kind: completed
      mission: bounty_story_4
  offer:
    kind: auto
  objective:
    kind: catch_npc
    planet: barnard_rock
    npc_name: "the pirate commander"
    building: mechanicshop
  completion_effects:
    - kind: pay
      credits: 11000
    - kind: grant_unlock
      name: frigate_license
    - kind: grant_unlock
      name: federation_weapons_license
    - kind: grant_unlock
      name: bounty_hunter_license

# Phase 3: Carrier tier (2 missions — pirate carriers in border systems)
# These are endgame-difficulty missions targeting the heavily armed pirate
# carrier ships. Completing the arc grants carrier_license.

bounty_story_5:
  faction: Federation
  briefing: "Vasquez is pacing outside the Barnard Station mechanic shop when she spots you. 'Commander — intel just came in. A pirate carrier has set up shop in the Drift. A carrier — it launches corvettes from a flight deck. Take out the carrier itself and the escorts scatter. 38,000 credits. Be careful — those corvettes will be on you the moment you engage.'"
  success_text: "Vasquez lets out a low whistle. 'You took down a carrier. That's not something many pilots can claim. 38,000 credits — and come back when you're ready for the last one.'"
  failure_text: "Vasquez stares at the tactical display. 'That carrier is still launching raids.'"
  preconditions:
    - kind: completed
      mission: bounty_story_4_catch
  offer:
    kind: npc_offer
    planet: barnard_station
    weight: 1.0
    building: mechanicshop
    approach: seek
    npc: officer_vasquez
  objective:
    kind: destroy_ships
    system: drift
    ship_type: pirate_carrier
    count: 1
    target_name: Pirate Carrier
    hostile: true
  completion_effects:
    - kind: pay
      credits: 38000

bounty_story_6:
  faction: Federation
  briefing: "Vasquez intercepts you near the shipyard, arms folded. 'This is the endgame, Commander. Two pirate carriers operating out of Alpha Centauri — they've been coordinating raids across the border for months. Eliminate both and we can start the paperwork for your carrier-class certification. 50,000 credits. This is the hardest contract we've ever posted. Good hunting.'"
  success_text: "Both carriers are wreckage. But sensors picked up a heavily shielded shuttle peeling off the flagship at the last moment — running silent for Pluto, deep in Sol's outer dark. 'That's the Pirate King,' Vasquez says quietly. 'The man who's been running all of this. Get him and it's over.'"
  failure_text: "Vasquez says quietly, 'They're still out there. The border won't hold much longer.'"
  preconditions:
    - kind: completed
      mission: bounty_story_5
  offer:
    kind: npc_offer
    planet: barnard_station
    weight: 1.0
    building: shipyard
    approach: seek
    npc: officer_vasquez
  objective:
    kind: destroy_ships
    system: alpha_centauri
    ship_type: pirate_carrier
    count: 2
    target_name: Pirate Carrier Group
    hostile: true
  completion_effects:
    - kind: pay
      credits: 50000

bounty_story_6_catch:
  faction: Federation
  briefing: "Track the Pirate King to Pluto. He'll be in the bar quarter — that's where every fugitive in Sol goes when they've got nowhere else. End this."
  success_text: "The Pirate King is drinking alone in a frost-rimed bar under Pluto's thin dome. He doesn't even reach for a weapon — just raises his glass. 'Took you long enough, Commander.' Vasquez comes over comms as he's cuffed: 'The border is secure for the first time in years. Carrier certification and turret clearance are yours — the full package. 22,000 credits on top. Every Federation officer in the fleet owes you a drink. The bounty board will keep posting carrier-class contracts if you're hungry for more.'"
  failure_text: "The Pirate King disappeared into Pluto's ice fields. He'll be rebuilding by next year."
  preconditions:
    - kind: completed
      mission: bounty_story_6
  offer:
    kind: auto
  objective:
    kind: catch_npc
    planet: pluto
    npc_name: "the Pirate King"
    npc: pirate_king
    building: bar
  completion_effects:
    - kind: pay
      credits: 22000
    - kind: grant_unlock
      name: carrier_license
    - kind: grant_unlock
      name: turret_license

# ── Espionage storyline ────────────────────────────────────────────────────
# A 15-mission arc offered by Federation Intelligence operating out of the
# Earth bar. Starts by hunting rebel spies who have infiltrated Federation
# worlds, escalates to intercepting rebel weapons-tech smugglers, then
# plunges the player into Rebel space for deep-cover meets with double
# agents and defectors. The final missions steal the schematics for the
# entire rebel fighter program. Completing the arc grants
# `rebel_weapons_license` (javelin missiles) and `rebel_ship_license`
# (rebel fighter + gunboat) — reverse-engineered from the stolen tech.
#
# Contains four combat missions, each with a `collect` requirement on the
# `weapons_tech` commodity, and six NPC objectives (3 catch_npc on
# Federation worlds, 3 meet_npc on Rebel worlds).

# Phase 1: Catch rebel infiltrators on Federation planets.

espionage_1:
  faction: Federation
  briefing: "A Federation Intelligence officer nurses a drink at the back of the Earth bar. She doesn't look up until you're seated. 'You clean? Good. A Sirius Cell operative has been lifting naval dispatches out of our Earth comm-center. He made our tail yesterday and he's gone to ground on the surface. Run him down before extraction — 3,000 credits. We don't exist, and neither does this conversation.'"
  success_text: "You corner the operative behind the market loading bays. He has a burst-transmitter in his hand — you get to it first. The officer's voice, three hours later: 'Clean work. Credits are in your account. Come back when you're ready for the next one.'"
  failure_text: "The operative made his extraction window. Whatever he had is already on a rebel data-lance halfway to Sirius."
  preconditions: []
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: bar
    approach: wait
    npc: fedintel_sable
  objective:
    kind: catch_npc
    planet: earth
    npc_name: "the Sirius Cell operative"
    building: market
  completion_effects:
    - kind: pay
      credits: 3000

espionage_2:
  faction: Federation
  briefing: "The officer is back in the same booth, no small talk. 'Their next cell is on Mars — a mining-data courier, looks like he's trying to slip belt-survey records out to a freighter due in two days. He hangs around the Mars market. 4,500 credits if you pick him up before that freighter clears customs.'"
  success_text: "The courier tries to run when he spots you — straight into a dead-end alley behind the market. He drops a data-sliver that Federation techs will spend a month decoding. 4,500 credits hits your account."
  failure_text: "The freighter lifted on schedule. Mars mining data is on its way to rebel shipyards."
  preconditions:
    - kind: completed
      mission: espionage_1
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: bar
    approach: seek
    npc: fedintel_sable
  objective:
    kind: catch_npc
    planet: mars
    npc_name: "the rebel courier"
    building: market
  completion_effects:
    - kind: pay
      credits: 4500

espionage_3:
  faction: Federation
  briefing: "The officer slides a folder across the table — a dossier thick with photos. 'This one's their handler. He recruits couriers across half the Federation, and right now he's on Kepler-22b pretending to be a shipyard inspector. He's the prize, Commander. Get him and we crack the whole network. 8,000 credits.'"
  success_text: "You catch the handler at the shipyard, flanked by two fake aides. He doesn't even struggle — just sighs like a tired professor. 'Always the new faces,' he mutters. Federation Intelligence descends on his safe-house within the hour. Your account ticks up by 8,000 credits. 'Commander,' the officer says, 'you've earned a seat at the real table. The next briefing will be different.'"
  failure_text: "The handler slipped offworld. Every lead we had just went cold."
  preconditions:
    - kind: completed
      mission: espionage_2
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: bar
    approach: seek
    npc: fedintel_sable
  objective:
    kind: catch_npc
    planet: kepler_22b
    npc_name: "the rebel handler"
    building: shipyard
  completion_effects:
    - kind: pay
      credits: 8000

# Phase 2: Intercept rebel weapons-tech smugglers (combat + delivery).

espionage_4:
  faction: Federation
  briefing: "'Here's the real work, Commander.' The officer pulls up a tactical display. 'The handler gave us a shipping schedule. Three rebel fighters are running stolen Federation weapons-tech through Alpha Centauri inside the next 48 hours. Destroy all three and salvage the cargo pods — we want the tech back. 11,000 credits.'"
  success_text: "Three rebel fighters, reduced to drifting wreckage. The cargo pods are intact — four units of weapons-tech, ours again. Head to Kepler-22b for the drop."
  failure_text: "The convoy made rebel space. That tech is already being reverse-engineered in Sirius."
  preconditions:
    - kind: completed
      mission: espionage_3
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: bar
    approach: seek
    npc: fedintel_sable
  objective:
    kind: destroy_ships
    system: alpha_centauri
    ship_type: fighter
    count: 3
    target_name: Rebel Smuggling Wing
    hostile: true
    collect:
      commodity: weapons_tech
      quantity: 4
  completion_effects:
    - kind: pay
      credits: 11000

espionage_4_deliver:
  faction: Federation
  briefing: "Run the recovered weapons-tech to Kepler-22b for technical analysis. Kepler's labs will strip it and tell us what the rebels have."
  success_text: "The Kepler-22b technician signs for the shipment: 'This buys us six months.' 6,000 credits hit your account. The officer wants to see you back on Earth when you're ready for the next one."
  failure_text: "The recovered weapons-tech never made it to analysis."
  preconditions:
    - kind: completed
      mission: espionage_4
  offer:
    kind: auto
  objective:
    kind: land_on_planet
    planet: kepler_22b
  requires:
    - kind: has_cargo
      commodity: weapons_tech
      quantity: 4
  completion_effects:
    - kind: remove_cargo
      commodity: weapons_tech
      quantity: 4
    - kind: pay
      credits: 6000

espionage_5:
  faction: Federation
  briefing: "The officer looks grim. 'Kepler's people looked at what you brought in. The rebels have been building a missile program off our own designs — javelin-class tech. There's a bigger shipment moving through the Drift right now — three stolen Federation corvettes running cargo, six cargo units between them. Destroy them and recover everything. 17,000 credits.'"
  success_text: "Three corvettes, three broken hulls. Six units of weapons-tech in your hold, enough to fill a whole Kepler lab. Officer wants it back on Earth this time — she's running the analysis herself."
  failure_text: "The corvettes escaped the Drift. Our javelin program may be lost."
  preconditions:
    - kind: completed
      mission: espionage_4_deliver
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: bar
    approach: seek
    npc: fedintel_sable
  objective:
    kind: destroy_ships
    system: drift
    ship_type: corvette
    count: 3
    target_name: Rebel Weapons Convoy
    hostile: true
    collect:
      commodity: weapons_tech
      quantity: 6
  completion_effects:
    - kind: pay
      credits: 17000

espionage_5_deliver:
  faction: Federation
  briefing: "Return the recovered weapons-tech to Earth for full analysis. Intelligence wants to see every circuit."
  success_text: "The officer runs a hand over the cargo crates like she's touching a holy relic. 'This is the whole rebel missile stack, Commander. Reverse-engineered against our own designs. You've earned javelin clearance — the schematics are yours to run.' 8,000 credits, plus the rebel weapons license."
  failure_text: "The shipment never reached Earth. The intelligence window has closed."
  preconditions:
    - kind: completed
      mission: espionage_5
  offer:
    kind: auto
  objective:
    kind: land_on_planet
    planet: earth
  requires:
    - kind: has_cargo
      commodity: weapons_tech
      quantity: 6
  completion_effects:
    - kind: remove_cargo
      commodity: weapons_tech
      quantity: 6
    - kind: pay
      credits: 8000
    - kind: grant_unlock
      name: rebel_weapons_license

# Phase 3: Deep cover in rebel space — meet informants, smuggle secrets.

espionage_6:
  faction: Federation
  briefing: "The officer's voice drops. 'We have an asset on Procyon Prime — deep cover, two years in. She has a package we can't move through normal channels. You'll dock at the Procyon Prime bar, look for a woman drinking alone. Codeword is \"east wind.\" Get in, get the intel, get out. This is rebel space, Commander. Procyon is a rebel capital. 10,000 credits.'"
  success_text: "The asset slides a data chit across the bar as she stands to leave. 'East wind's blowing harder every day. Tell her that.' She's gone before you can answer. 10,000 credits; the officer on Earth wants you back for debrief and the next contact."
  failure_text: "The asset's cover is blown. We lost her."
  preconditions:
    - kind: completed
      mission: espionage_5_deliver
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: bar
    approach: seek
    npc: fedintel_sable
  objective:
    kind: meet_npc
    planet: procyon_prime
    npc_name: "the Procyon asset"
    building: bar
  completion_effects:
    - kind: pay
      credits: 10000

espionage_7:
  faction: Federation
  briefing: "'The asset's chit pointed us at a second contact — a rebel weapons engineer on Sirius-C who wants out. He's got design data for rebel fighter airframes. Meet him at the mechanic shop. He'll be the one pretending to fix a hauler. 8,500 credits on the meet, more on delivery.'"
  success_text: "The engineer pushes a sealed data-cartridge under a greasy hauler manifold and slides it to you with his boot. 'Everything I know. Get it home.' He won't make eye contact. 8,500 credits in your account — and your cargo hold just got heavier."
  failure_text: "The engineer missed his window. Every rebel counter-intel officer in Sirius is looking for him now."
  preconditions:
    - kind: completed
      mission: espionage_6
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: bar
    approach: seek
    npc: fedintel_sable
  objective:
    kind: meet_npc
    planet: sirius_c
    npc_name: "the rebel engineer"
    building: mechanicshop
  completion_effects:
    - kind: pay
      credits: 8500

espionage_7_deliver:
  faction: Federation
  briefing: "Get the engineer's data-cartridge to Kepler-22b before rebel counter-intel tracks the leak. He gave you four units' worth of schematics — guard them."
  success_text: "Kepler's analysts look at the schematics and go quiet for a long time. 'This is half a rebel shipyard.' The officer authorizes 14,000 credits. 'We're close, Commander. One more trip into rebel space.'"
  failure_text: "The data-cartridge was lost. A life was spent for nothing."
  preconditions:
    - kind: completed
      mission: espionage_7
  offer:
    kind: auto
  start_effects:
    - kind: load_cargo
      commodity: weapons_tech
      quantity: 4
      reserved: true
  objective:
    kind: land_on_planet
    planet: kepler_22b
  requires:
    - kind: has_cargo
      commodity: weapons_tech
      quantity: 4
  completion_effects:
    - kind: remove_cargo
      commodity: weapons_tech
      quantity: 4
    - kind: pay
      credits: 14000

espionage_8:
  faction: Federation
  briefing: "The officer is pacing when you walk in. 'We have a problem. The rebels know the engineer defected — they've pulled an undercover frigate out of the Sirius fleet yard to hunt for whoever he leaked to. That's you, Commander. We're turning this around. Engage the frigate in Sirius before it ships out, break it open, and recover whatever weapons-tech they loaded for pursuit. 28,000 credits.'"
  success_text: "The rebel frigate folds under sustained fire. Eight units of weapons-tech drift free of the wreckage — pursuit ordnance they never got to use. Bring it home."
  failure_text: "The frigate escaped. It will find you eventually."
  preconditions:
    - kind: completed
      mission: espionage_7_deliver
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: bar
    approach: seek
    npc: fedintel_sable
  objective:
    kind: destroy_ships
    system: sirius
    ship_type: frigate
    count: 1
    target_name: Rebel Counter-Intel Frigate
    hostile: true
    collect:
      commodity: weapons_tech
      quantity: 6
  completion_effects:
    - kind: pay
      credits: 28000

espionage_8_deliver:
  faction: Federation
  briefing: "The frigate's weapons-tech stash is worth more than the ship itself. Run it to Earth for Intelligence."
  success_text: "The officer signs for the shipment and pours two drinks. 'Sit down, Commander. There's one more operation, and it's the one we've been building toward.' 12,000 credits land in your account."
  failure_text: "The frigate's weapons-tech is lost."
  preconditions:
    - kind: completed
      mission: espionage_8
  offer:
    kind: auto
  objective:
    kind: land_on_planet
    planet: earth
  requires:
    - kind: has_cargo
      commodity: weapons_tech
      quantity: 6
  completion_effects:
    - kind: remove_cargo
      commodity: weapons_tech
      quantity: 6
    - kind: pay
      credits: 12000

# Phase 4: The endgame — steal the complete rebel fighter program.

espionage_9:
  faction: Federation
  briefing: "The officer doesn't sit down. 'Rigel Outpost. There is a rebel chief engineer there who has the complete airframe-and-powerplant schematics for the entire rebel fighter program — not fragments, the whole thing. He's flipping. We don't know why and we don't care. You meet him at the Rigel Outpost shipyard. Get the data. 16,000 credits on meet, another 100,000 on delivery. Don't come back empty.'"
  success_text: "The chief engineer meets you in a hangar bay under a stripped-down gunboat. He hands over a sealed schematics-core the size of your fist. 'Take it, take it. Go. They'll kill me if you stay another minute.' You go. 16,000 credits; now get out of Rigel alive."
  failure_text: "The chief engineer was extracted by rebel counter-intel. The full rebel fighter program stays rebel."
  preconditions:
    - kind: completed
      mission: espionage_8_deliver
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: bar
    approach: seek
    npc: fedintel_sable
  objective:
    kind: meet_npc
    planet: rigel_outpost
    npc_name: "the rebel chief engineer"
    building: shipyard
  completion_effects:
    - kind: pay
      credits: 16000

espionage_10_escape:
  faction: Federation
  briefing: "Rebel counter-intel has the whole Sirius fleet hunting you. You'll pass through the Drift on your way home — and a rebel fighter wing will be waiting. Break through. Four rebel fighters. Pick up the escort's weapons-tech from the wreckage on your way out — it's the last piece Intelligence needs."
  success_text: "Four rebel fighters, four debris fields. Five units of salvaged weapons-tech in the hold, plus the chief engineer's schematics-core. The Drift falls silent behind you. Earth is next."
  failure_text: "The intercept wing caught you in the Drift. The schematics-core is rebel property again."
  preconditions:
    - kind: completed
      mission: espionage_9
  offer:
    kind: auto
  start_effects:
    - kind: load_cargo
      commodity: weapons_tech
      quantity: 3
      reserved: true
  objective:
    kind: destroy_ships
    system: drift
    ship_type: fighter
    count: 4
    target_name: Rebel Intercept Wing
    hostile: true
    collect:
      commodity: weapons_tech
      quantity: 5
  completion_effects:
    - kind: pay
      credits: 24000

espionage_final:
  faction: Federation
  briefing: "Bring the schematics-core and the salvaged weapons-tech home to Earth. Federation Intelligence is waiting."
  success_text: "The officer stares at the schematics-core on her desk like it's something holy. 'Commander — we just stole the entire rebel fighter program.' A senior admiral, whose face you won't remember tomorrow, walks in and hands you a full Federation clearance: rebel-ship operational license. 'You can fly their fighters now, Commander. We built ours off of theirs. The circle closes.' 45,000 credits, the rebel ship license, and the knowledge that you're the reason the border holds."
  failure_text: "The schematics-core was lost. Years of espionage work, gone."
  preconditions:
    - kind: completed
      mission: espionage_10_escape
  offer:
    kind: auto
  objective:
    kind: land_on_planet
    planet: earth
  requires:
    - kind: has_cargo
      commodity: weapons_tech
      quantity: 8
  completion_effects:
    - kind: remove_cargo
      commodity: weapons_tech
      quantity: 8
    - kind: pay
      credits: 45000
    - kind: grant_unlock
      name: rebel_ship_license

# ══════════════════════════════════════════════════════════════════════════════
# Free Frontier — "The Reaches"  (grants free_frontier_license at stage 1, so the
# player can buy the cheap militia hulls for the later defensive fights).
# Reached via the borderlands; gated on having a real combat ship.
# ══════════════════════════════════════════════════════════════════════════════
frontier_1:
  faction: FreeFrontier
  briefing: "A weather-beaten harbormaster corners you in the Halcyon free port. 'You fly like you can fight. Pirates are gutting our ice convoys — two corvettes, working the Halcyon lanes. Run them off and the Reaches won't forget it. 22,000, and Coalition papers — our prospectors and ore-dredgers, and the flak gun they mount, are yours after that. The fighting hulls you earn one at a time.'"
  success_text: "The harbormaster grips your hand. 'You're one of us now. Ceres yard sells you our working hulls — the prospector, the dredger, the flak gun. The fast hulls come as you prove them. Come find me — there's more.'"
  failure_text: "The convoys burn. The harbormaster won't look at you."
  preconditions:
    - kind: completed
      mission: pirate_bounty_sol
  offer:
    kind: npc_offer
    planet: halcyon_port
    weight: 1.0
    building: bar
    approach: seek
    npc: harbormaster_brekk
  objective:
    kind: destroy_ships
    system: halcyon
    ship_type: pirate_corvette
    count: 2
    target_name: Reach Raiders
    hostile: true
  completion_effects:
    - kind: pay
      credits: 8000
    - kind: grant_unlock
      name: free_frontier_license
frontier_2:
  faction: FreeFrontier
  briefing: "The harbormaster slides a manifest over. 'Ceres colony's hungry — a Federation cutter impounded their grain over a tariff. We loaded a quiet 15 units. Get it down to Ceres before anyone counts heads. 10,000.'"
  success_text: "Ceres eats tonight. 10,000 credits, and no questions — plus the keys to a Coalition skiff, the lightest interceptor in the Reaches."
  failure_text: "The grain never made it. Ceres tightens its belt again."
  preconditions:
    - kind: completed
      mission: frontier_1
  offer:
    kind: npc_offer
    planet: halcyon_port
    weight: 1.0
    building: market
    approach: seek
    npc: harbormaster_brekk
  start_effects:
    - kind: load_cargo
      commodity: food
      quantity: 15
      reserved: true
  objective:
    kind: land_on_planet
    planet: ceres
  requires:
    - kind: has_cargo
      commodity: food
      quantity: 15
  completion_effects:
    - kind: remove_cargo
      commodity: food
      quantity: 15
    - kind: pay
      credits: 10000
    - kind: grant_unlock
      name: frontier_skiff_license
frontier_3:
  faction: FreeFrontier
  briefing: "'The Reaches won't hold unless the holdouts band together. There's a harbormaster on Kuiper Reach who won't answer my calls — but she'll meet a pilot who proved themselves. Find her in the Kuiper Haven bar. Codeword: open lanes.'"
  success_text: "The Kuiper harbormaster hears you out, then nods slowly. 'Alright. The Coalition stands. Tell them Kuiper's in.' 9,500 credits — and she signs over a sailtender, mine-rails and all, so you can seed the lanes against pursuit."
  failure_text: "She slipped offworld before you arrived. The Coalition fractures."
  preconditions:
    - kind: completed
      mission: frontier_2
  offer:
    kind: npc_offer
    planet: halcyon_port
    weight: 1.0
    building: bar
    approach: seek
    npc: harbormaster_brekk
  objective:
    kind: meet_npc
    planet: kuiper_haven
    npc_name: "the Kuiper harbormaster"
    building: bar
  completion_effects:
    - kind: pay
      credits: 9500
    - kind: grant_unlock
      name: frontier_sailtender_license
frontier_4:
  faction: FreeFrontier
  briefing: "The harbormaster's voice is tight over comms. 'A Bastion raiding column is bearing down on Ceres Freehold — three iron hulls, no mercy in them. The whole Coalition is watching. Hold the line. 50,000, and you'll have earned every credit.' Two Freehold skiffs will fly on your wing."
  success_text: "The Bastion column breaks against the Freehold's guns — and your own. Ceres holds. 'The Reaches are free another day, Captain,' the harbormaster says. 'Because of you.' 20,000 credits — and a harvester gunship off the Ceres line, mass-driver fitted, so you can hit back harder."
  failure_text: "Ceres Freehold burns. The Coalition will not forget who failed them."
  preconditions:
    - kind: completed
      mission: frontier_3
  offer:
    kind: npc_offer
    planet: ceres
    weight: 1.0
    building: bar
    approach: seek
    npc: harbormaster_brekk
  objective:
    kind: destroy_ships
    system: ceres_freehold
    ship_type: bastion_guard
    count: 3
    target_name: Bastion Raiders
    hostile: true
  completion_effects:
    - kind: pay
      credits: 20000
    - kind: grant_unlock
      name: frontier_harvester_license
    - kind: shift_influence
      system: ceres_freehold
      faction: FreeFrontier
      delta: 0.1
  squadron: [frontier_skiff, frontier_skiff]
frontier_5:
  faction: FreeFrontier
  briefing: "The harbormaster's grin is gone. 'The Bastion learned their lesson and came back heavier — a monitor, the meanest hull they field, leading a push on Kuiper Reach. We have one answer to a monitor, Captain: ours. Take the new gunboat off the Kuiper ways and break theirs. 75,000, and the heavy line is yours.' A skiff and a harvester gunship fly escort — the Reaches fight together now."
  success_text: "The Bastion monitor folds and the push collapses with it. The Coalition opens its heaviest hull to you — the frontier monitor and its flak turret. 30,000 credits. 'The Reaches will sing about this one,' the harbormaster says."
  failure_text: "The Bastion monitor breaks through, and Kuiper Reach falls under the iron writ."
  preconditions:
    - kind: completed
      mission: frontier_4
  offer:
    kind: npc_offer
    planet: ceres
    weight: 1.0
    building: bar
    approach: seek
    npc: harbormaster_brekk
  objective:
    kind: destroy_ships
    system: kuiper_reach
    ship_type: siege_monitor
    count: 1
    target_name: Bastion Monitor
    hostile: true
  completion_effects:
    - kind: pay
      credits: 30000
    - kind: grant_unlock
      name: frontier_monitor_license
    - kind: shift_influence
      system: kuiper_reach
      faction: FreeFrontier
      delta: 0.12
  squadron: [frontier_skiff, frontier_harvester]

# ══════════════════════════════════════════════════════════════════════════════
# Helios Combine — "Quarterly Returns"  (grants helios_license at stage 1).
# ══════════════════════════════════════════════════════════════════════════════
helios_1:
  faction: Helios
  briefing: "A Helios recruiter in a spotless suit finds you at Helios Prime. 'We headhunt talent. Pirates are circling an automated ore convoy near the Foundry — two of them. Clear them; the shareholders thank you. 22,000, plus a Combine trade clearance — our courier and freight hulls, and the lance sidearm they ship with, open to you. The combat line you earn separately.'"
  success_text: "'Efficient. The Combine likes efficient.' 8,000 credits, and your Helios trade clearance is live — the logistics hulls (courier, freighter, hauler) and the Helios lance are yours at any Combine yard. Prove yourself further and the war hulls follow."
  failure_text: "The convoy is lost. The recruiter has already moved on to the next candidate."
  preconditions:
    - kind: completed
      mission: pirate_bounty_sol
  offer:
    kind: npc_offer
    planet: helios_prime
    weight: 1.0
    building: bar
    approach: seek
    npc: helios_handler
  objective:
    kind: destroy_ships
    system: the_foundry
    ship_type: pirate_corvette
    count: 2
    target_name: Convoy Raiders
    hostile: true
  completion_effects:
    - kind: pay
      credits: 8000
    - kind: grant_unlock
      name: helios_license
helios_2:
  faction: Helios
  briefing: "The recruiter is unbothered. 'A delivery. 12 units of weapons-parts to Procyon Prime — yes, the Rebels. We sell to everyone; that's the whole point. 28,000, and don't ask what they do with it.'"
  success_text: "The Rebels take delivery without comment. 11,000 credits. The Combine arms both sides and bills both sides — and clears you for the Drone interceptor, the smallest hull in its war line."
  failure_text: "The shipment was lost. The Combine notes the inefficiency."
  preconditions:
    - kind: completed
      mission: helios_1
  offer:
    kind: npc_offer
    planet: helios_prime
    weight: 1.0
    building: market
    approach: seek
    npc: helios_handler
  start_effects:
    - kind: load_cargo
      commodity: weapons_parts
      quantity: 12
      reserved: true
  objective:
    kind: land_on_planet
    planet: procyon_prime
  requires:
    - kind: has_cargo
      commodity: weapons_parts
      quantity: 12
  completion_effects:
    - kind: remove_cargo
      commodity: weapons_parts
      quantity: 12
    - kind: pay
      credits: 11000
    - kind: grant_unlock
      name: helios_drone_license
helios_3:
  faction: Helios
  briefing: "The recruiter's smile thins. 'A problem. Free Frontier organizers seized one of our Foundry refineries over wages. Their ringleader is hiding in the Foundry station. Bring him in — quietly — before the next shareholder call. 13,000.'"
  success_text: "You pin the organizer in a Foundry stairwell. He spits at your boots. The Combine's credits — 13,000 — hit your account before he's even processed, along with clearance for the Enforcer gunship and the seeker missiles it carries."
  failure_text: "The organizer rallied the workers and vanished. The strike spreads."
  preconditions:
    - kind: completed
      mission: helios_2
  offer:
    kind: npc_offer
    planet: helios_prime
    weight: 1.0
    building: bar
    approach: seek
    npc: helios_handler
  objective:
    kind: catch_npc
    planet: foundry_station
    npc_name: "the co-op organizer"
    building: market
  completion_effects:
    - kind: pay
      credits: 13000
    - kind: grant_unlock
      name: helios_enforcer_license
helios_4:
  faction: Helios
  briefing: "'A rival cartel is undercutting us in the Drift. Their flagship coordinates the whole operation. Cripple it and they'll sell to us by morning. 18,000. This is how the Combine wins — not with flags, with leverage.'"
  success_text: "The rival flagship drifts dead. By dawn the cartel has accepted the Combine's terms. 18,000 credits. 'You have a future here, Director,' the recruiter says, authorizing the Overseer command hull and its drone-bay tech for you."
  failure_text: "The rival escaped. The Combine's margin slips a point."
  preconditions:
    - kind: completed
      mission: helios_3
  offer:
    kind: npc_offer
    planet: helios_prime
    weight: 1.0
    building: bar
    approach: seek
    npc: helios_handler
  objective:
    kind: destroy_ships
    system: drift
    ship_type: freighter
    count: 1
    target_name: Rival Cartel Flagship
    hostile: true
  completion_effects:
    - kind: pay
      credits: 18000
    - kind: grant_unlock
      name: helios_overseer_license
helios_5:
  faction: Helios
  briefing: "The recruiter — now your handler — is unsmiling. 'A competitor has fielded a Titan-class dreadnought to break our hold on the Drift. The board has authorized a response in kind. Fly our prototype, kill theirs, and the production line is yours to command. 28,000. This is the top of the house.'"
  success_text: "The rival Titan comes apart under your guns. The Combine opens its own Titan line to you — the largest hull it builds. 28,000 credits. 'Welcome to the board,' the handler says."
  failure_text: "Their Titan still rules the Drift, and the board's patience is spent."
  preconditions:
    - kind: completed
      mission: helios_4
  offer:
    kind: npc_offer
    planet: helios_prime
