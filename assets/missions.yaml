# Phase 4: The endgame — steal the complete rebel fighter program.

espionage_9:
  briefing: "The officer doesn't sit down. 'Rigel Outpost. There is a rebel chief engineer there who has the complete airframe-and-powerplant schematics for the entire rebel fighter program — not fragments, the whole thing. He's flipping. We don't know why and we don't care. You meet him at the Rigel Outpost shipyard. Get the data. 40,000 credits on meet, another 100,000 on delivery. Don't come back empty.'"
  success_text: "The chief engineer meets you in a hangar bay under a stripped-down gunboat. He hands over a sealed schematics-core the size of your fist. 'Take it, take it. Go. They'll kill me if you stay another minute.' You go. 40,000 credits; now get out of Rigel alive."
  failure_text: "The chief engineer was extracted by rebel counter-intel. The full rebel fighter program stays rebel."
  preconditions:
    - kind: completed
      mission: espionage_8_deliver
  offer:
