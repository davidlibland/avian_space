deliver_wheat_intro:
  briefing: "A dockworker sprints toward you from the market stalls, out of breath. 'Thank god — a pilot. Mars colony is starving. 10 units of food need to get there yesterday. You take it, we pay on delivery. Please.'"
  success_text: "The governor claps you on the shoulder. The grain is already being unloaded."
  failure_text: "Word travels fast. Mars will be looking for a different pilot next time."
  preconditions: []
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: market
    approach: seek
  start_effects:
    - kind: load_cargo
      commodity: food
      quantity: 10
      reserved: true
  objective:
    kind: land_on_planet
    planet: mars
  requires:
    - kind: has_cargo
      commodity: food
      quantity: 10
  completion_effects:
    - kind: remove_cargo
      commodity: food
      quantity: 10
    - kind: pay
      credits: 1500

scavenge_iron:
  briefing: "A grizzled prospector leans against the mechanic shop wall, chewing something. 'Need 5 units of iron — clean stuff, pulled from the asteroid fields in Sol. No market-bought slag. Bring it back to Earth and I'll make it worth your time.'"
  success_text: "You've got the ore. Head back to Earth to collect your pay."
  failure_text: "Deal's off."
  preconditions:
    - kind: completed
      mission: deliver_wheat_intro
  offer:
    kind: npc_offer
    planet: mars
    weight: 0.5
    building: mechanicshop
  objective:
    kind: collect_pickups
    commodity: iron
    system: sol
    quantity: 5

scavenge_iron_deliver:
  briefing: "Deliver the iron to the prospector on Earth."
  success_text: "The prospector weighs the ore in one hand and nods. 'That's the real thing.'"
  failure_text: "The prospector is long gone by the time you check back in."
  preconditions:
    - kind: completed
      mission: scavenge_iron
  offer:
    kind: auto
  objective:
    kind: land_on_planet
    planet: earth
  requires:
    - kind: has_cargo
      commodity: iron
      quantity: 5
  completion_effects:
    - kind: remove_cargo
      commodity: iron
      quantity: 5
    - kind: pay
      credits: 2500

# ── Mining Guild storyline ─────────────────────────────────────────────────
# Three escalating collect-iron missions that introduce the player to
# asteroid mining across the Federation core and border systems. The final
# stage grants the mining license (unlocks the asteroid_miner in shipyards)
# plus an ongoing mining-template unlock so paid mining contracts keep
# showing up in the bar.

mining_story_1:
  briefing: "A weather-beaten Mining Guild recruiter loiters near the shipyard, eyeing incoming pilots. She waves you over. 'Kid, we're short on haulers. Shoot up some asteroids around Sol and bring back 4 units of clean iron — no market-bought slag. 4,000 credits. Find me at the Mars market when you're done.'"
  success_text: "The recruiter looks impressed. 'Go see the foreman on Mars — she's got bigger work.'"
  failure_text: "The recruiter snorts. 'Don't waste my time again.'"
  preconditions: []
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: shipyard
  objective:
    kind: collect_pickups
    commodity: iron
    system: sol
    quantity: 4
  completion_effects:
    - kind: pay
      credits: 4000

mining_story_2:
  briefing: "The foreman is checking cargo manifests outside the Mars market. She pushes a datapad across a crate toward you. '6 units of iron, pulled from the Tau Ceti belt. Federation space, but further out — you'll need to jump. 8,000 on delivery. Come see our frontier contact at Barnard Rock when you make it back.'"
  success_text: "The foreman nods. 'Frontier work pays the best. Barnard Rock — ask for the Guild near the market.'"
  failure_text: "The foreman just shakes her head."
  preconditions:
    - kind: completed
      mission: mining_story_1
  offer:
    kind: npc_offer
    planet: mars
    weight: 1.0
    building: market
  objective:
    kind: collect_pickups
    commodity: iron
    system: tau_ceti
    quantity: 6
  completion_effects:
    - kind: pay
      credits: 8000

mining_story_3:
  briefing: "A wiry Guild agent waits outside the Barnard Rock market, arms folded. 'Border work. 8 units of clean iron, pulled from the Barnard belt. Rebels and pirates both sweep through here, so keep your eyes open. 18,000 credits — and if you make it back, you'll have earned your Miner's Guild certification. Real mining contracts will start showing up after that.'"
  success_text: "The agent slides a signed certification across the counter: 'You're Guild now. Check any bar for mining contracts.' Your ship computer registers the new licenses."
  failure_text: "The agent sighs. 'The border eats the unprepared.'"
  preconditions:
    - kind: completed
      mission: mining_story_2
  offer:
    kind: npc_offer
    planet: barnard_rock
    weight: 1.0
    building: market
  objective:
    kind: collect_pickups
    commodity: iron
    system: barnard
    quantity: 8
  completion_effects:
    - kind: pay
      credits: 18000
    - kind: grant_unlock
      name: mining_license
    - kind: grant_unlock
      name: mining_templates_unlocked

# ── Merchant Guild storyline ───────────────────────────────────────────────
# Three escalating delivery missions that introduce the player to the
# Merchant Guild's three cargo-ship tiers. Each stage pays roughly the
# price of the next ship up and grants its license, creating a natural
# upgrade path: shuttle → freighter → hauler → bulk_carrier.

merchant_story_1:
  briefing: "A Merchant Guild rep is haggling with a vendor near the market. He spots you and breaks away. 'You look like you need work. Short run — 8 units of food to Moon colony. Good shakedown for a new pilot. 45,000 on delivery, and we'll get you certified for a real cargo ship. Come find me at Moon's market when it's done.'"
  success_text: "The rep on Moon hands over the credits and a certification chit. 'Freighter license. Spend wisely. Come find me at the market for the next run.'"
  failure_text: "The rep shrugs. 'The Guild's got other pilots.'"
  preconditions: []
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: market
  start_effects:
    - kind: load_cargo
      commodity: food
      quantity: 8
      reserved: true
  objective:
    kind: land_on_planet
    planet: moon
  requires:
    - kind: has_cargo
      commodity: food
      quantity: 8
  completion_effects:
    - kind: remove_cargo
      commodity: food
      quantity: 8
    - kind: pay
      credits: 45000
    - kind: grant_unlock
      name: merchant_freighter_license

merchant_story_2:
  briefing: "The Guild rep is leaning against a stack of crates outside the Moon market. He waves you over with a manifest. 'Bigger run this time — 50 units of food out to tau_ceti_2, one jump from Sol. You'll want a freighter for this one. 50,000 on delivery. When it's done, head to the tau_ceti_2 market — the Guild's regional office is there.'"
  success_text: "The regional manager signs off the shipment and hands you a hauler license: 'Good run. We've got one more contract for you. Come back when you're ready.'"
  failure_text: "The regional manager's disappointment is palpable."
  preconditions:
    - kind: completed
      mission: merchant_story_1
  offer:
    kind: npc_offer
    planet: moon
    weight: 1.0
    building: market
  start_effects:
    - kind: load_cargo
      commodity: food
      quantity: 50
      reserved: true
  objective:
    kind: land_on_planet
    planet: tau_ceti_2
  requires:
    - kind: has_cargo
      commodity: food
      quantity: 50
  completion_effects:
    - kind: remove_cargo
      commodity: food
      quantity: 50
    - kind: pay
      credits: 50000
    - kind: grant_unlock
      name: merchant_hauler_license

merchant_story_3:
  briefing: "The regional manager is reviewing shipments outside the tau_ceti_2 market. She unrolls a long-haul contract. '75 units of food to kepler_22b, deep in Federation space. Long jumps. You'll need a hauler for this — anything smaller and the cargo won't fit. 85,000 credits, and we'll certify you for the biggest ships the Guild sells.'"
  success_text: "The kepler_22b quartermaster confirms receipt. 'You're one of ours now. Bulk carrier license is yours — if you can afford one.'"
  failure_text: "The contract is voided."
  preconditions:
    - kind: completed
      mission: merchant_story_2
  offer:
    kind: npc_offer
    planet: tau_ceti_2
    weight: 1.0
    building: market
  start_effects:
    - kind: load_cargo
      commodity: food
      quantity: 75
      reserved: true
  objective:
    kind: land_on_planet
    planet: kepler_22b
  requires:
    - kind: has_cargo
      commodity: food
      quantity: 75
  completion_effects:
    - kind: remove_cargo
      commodity: food
      quantity: 75
    - kind: pay
      credits: 85000
    - kind: grant_unlock
      name: merchant_bulk_license

# ── Bounty: Sol pirate ─────────────────────────────────────────────────────

pirate_bounty_sol:
  briefing: "A Federation officer jogs over from the shipyard, waving you down. 'Pilot — we need you. There's a pirate corvette tearing through merchant convoys in Sol. Weak ship, but they've hit three transports this week alone. Destroy them — 25,000 credits, enough to pick up a fighter if that's your thing.'"
  success_text: "As the corvette breaks apart, your sensors pick up a faint thruster signature — an escape pod, accelerating hard toward the outer system. The officer's voice crackles over comms: 'Don't let them disappear. Our intel says the pod is heading for Triton. Land there and apprehend the pirate before they find a new ship.'"
  failure_text: "The officer shakes her head. 'They got away. Maybe next time.'"
  preconditions: []
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: shipyard
    approach: seek
  objective:
    kind: destroy_ships
    system: sol
    ship_type: pirate_corvette
    count: 1
    target_name: Notorious Pirate
    hostile: true
  completion_effects:
    - kind: pay
      credits: 25000

pirate_escape_pod:
  briefing: "Land on Triton (in sol) and apprehend the pirate before they find a new ship."
  success_text: "You corner the pirate in a frozen alley on Triton. They raise their hands. 'Alright, alright. You got me.' The Federation transfers 15,000 credits and a fighter certification to your account — the debrief confirmed this pirate had been scouting Federation convoys for months."
  failure_text: "The pirate slipped away in the ice fields. They'll be someone else's problem now."
  preconditions:
    - kind: completed
      mission: pirate_bounty_sol
  offer:
    kind: auto
  start_effects: []
  objective:
    kind: catch_npc
    planet: triton
    npc_name: "the escaped pirate"
    building: bar
  completion_effects:
    - kind: pay
      credits: 15000
    - kind: grant_unlock
      name: fighter_license

# ── Bounty Hunter storyline ────────────────────────────────────────────────
# Escalating combat missions that unlock the corvette, frigate, and IR
# missiles. Starts at Earth shipyard (Sol), moves outward through
# progressively dangerous systems. Completing the full arc grants
# bounty_hunter_license which unlocks ongoing random bounty templates in
# any bar.

# Phase 1: Corvette path (2 missions, pays ~18k each → corvette costs 18k)

bounty_story_1:
  briefing: "The Federation officer from last time intercepts you near the Earth shipyard. 'Nice work with that pirate. We've got reports of two more pirate corvettes raiding convoys near Alpha Centauri. Dangerous space — no planets, thick asteroid fields. Take them out — 18,000 credits. Come find me here when it's done.'"
  success_text: "The officer nods. 'Alpha Centauri is a little safer tonight. 18,000 credits. Come back — we've got one more job before we can certify you for a real combat ship.'"
  failure_text: "The officer grimaces. 'Those pirates are still out there.'"
  preconditions:
    - kind: completed
      mission: pirate_bounty_sol
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: shipyard
    approach: seek
  objective:
    kind: destroy_ships
    system: alpha_centauri
    ship_type: pirate_corvette
    count: 2
    target_name: Pirate Raiders
    hostile: true
  completion_effects:
    - kind: pay
      credits: 18000

bounty_story_2:
  briefing: "The officer catches you outside the shipyard, datapad in hand. 'A pirate missile boat has been ambushing freighters in the Drift. Heavy hitter — mines and missiles both. Destroy it and we can start your path to corvette-class certification. 20,000 credits on top.'"
  success_text: "As the missile boat cracks open, an encrypted distress call spikes across the comms — a senior pirate captain, coordinating raids from the ground. The Federation officer comes on: 'That voice. We know him. He's gone to ground on Titan. Run him down before he regroups.'"
  failure_text: "The officer shakes her head. 'That missile boat is still out there.'"
  preconditions:
    - kind: completed
      mission: bounty_story_1
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: shipyard
    approach: seek
  objective:
    kind: destroy_ships
    system: drift
    ship_type: pirate_missile_boat
    count: 1
    target_name: Pirate Missile Boat
    hostile: true
  completion_effects:
    - kind: pay
      credits: 20000

bounty_story_2_catch:
  briefing: "The pirate captain is hiding in Titan's smog-choked dockside quarter. Find him before he slips offworld — our intel says he's trying to buy passage out of a bar."
  success_text: "You pin the captain against a bulkhead in a back-alley bar. He spits, but surrenders. The Federation uploads the corvette certification and proton-beam clearance to your ship the moment he's in custody. 15,000 credits too. Vasquez at Barnard Station has the next tier whenever you're ready."
  failure_text: "The captain vanished into Titan's underlayer. He'll be running a new crew within a month."
  preconditions:
    - kind: completed
      mission: bounty_story_2
  offer:
    kind: auto
  objective:
    kind: catch_npc
    planet: titan
    npc_name: "the pirate captain"
    building: bar
  completion_effects:
    - kind: pay
      credits: 15000
    - kind: grant_unlock
      name: corvette_license
    - kind: grant_unlock
      name: proton_beam_license

# Phase 2: Frigate path (2 missions, pays ~60k each → frigate costs 120k)

bounty_story_3:
  briefing: "Captain Vasquez is inspecting a damaged hull outside the Barnard Station mechanic shop. She sizes you up. 'You've got a reputation now. We've tracked a pirate strike group — two missile boats — operating out of the Drift. Border space, no backup. 55,000 credits if you eliminate them both. Report back here when it's done.'"
  success_text: "Vasquez stamps your record. 'Impressive. One more target and you'll have earned a frigate certification — and access to Federation IR missiles. Come find me at the mechanic shop.'"
  failure_text: "Vasquez says nothing. The dossier stays on the table."
  preconditions:
    - kind: completed
      mission: bounty_story_2_catch
  offer:
    kind: npc_offer
    planet: barnard_station
    weight: 1.0
    building: mechanicshop
    approach: seek
  objective:
    kind: destroy_ships
    system: drift
    ship_type: pirate_missile_boat
    count: 2
    target_name: Pirate Strike Group
    hostile: true
  completion_effects:
    - kind: pay
      credits: 55000

bounty_story_4:
  briefing: "Vasquez strides over from the mechanic shop, urgency in her step. 'This is the big one. Three pirate missile boats have set up a forward base in Alpha Centauri — dug in among the asteroid fields. Take all three out and we can move you up to frigate-class. 65,000 credits. And after this, the bounty board will keep you busy. Good hunting.'"
  success_text: "Vasquez reviews the combat data. 'Clean work. But — one of the boats launched a lifeboat just before it broke up. Our tracker says it burned for Barnard Rock. That's the pirate ring's commander. Get to him before local sympathizers hide him away.'"
  failure_text: "Vasquez stares at the tactical display. 'They're still operational.'"
  preconditions:
    - kind: completed
      mission: bounty_story_3
  offer:
    kind: npc_offer
    planet: barnard_station
    weight: 1.0
    building: shipyard
    approach: seek
  objective:
    kind: destroy_ships
    system: alpha_centauri
    ship_type: pirate_missile_boat
    count: 3
    target_name: Pirate Forward Base
    hostile: true
  completion_effects:
    - kind: pay
      credits: 65000

bounty_story_4_catch:
  briefing: "The pirate commander fled to Barnard Rock. Our informants say he's bribing a mechanic to swap transponders on a hauler. Find him at the mechanic shop before he lifts off under a new name."
  success_text: "You catch the commander crouched behind a coolant rig, half-disguised in mechanic's coveralls. He laughs bitterly: 'You got me.' The Federation's response is immediate — frigate certification, Federation IR missile clearance, and full bounty-hunter accreditation all land on your file. 25,000 credits on top. 'Commander, you're one of ours now,' Vasquez says. 'The bounty board has a standing contract for you — check it any time.'"
  failure_text: "The commander's transponder vanished from our scopes an hour later. He's already on another ship, halfway to the Drift."
  preconditions:
    - kind: completed
      mission: bounty_story_4
  offer:
    kind: auto
  objective:
    kind: catch_npc
    planet: barnard_rock
    npc_name: "the pirate commander"
    building: mechanicshop
  completion_effects:
    - kind: pay
      credits: 25000
    - kind: grant_unlock
      name: frigate_license
    - kind: grant_unlock
      name: federation_weapons_license
    - kind: grant_unlock
      name: bounty_hunter_license

# Phase 3: Carrier tier (2 missions — pirate carriers in border systems)
# These are endgame-difficulty missions targeting the heavily armed pirate
# carrier ships. Completing the arc grants carrier_license.

bounty_story_5:
  briefing: "Vasquez is pacing outside the Barnard Station mechanic shop when she spots you. 'Commander — intel just came in. A pirate carrier has set up shop in the Drift. A carrier — it launches corvettes from a flight deck. Take out the carrier itself and the escorts scatter. 90,000 credits. Be careful — those corvettes will be on you the moment you engage.'"
  success_text: "Vasquez lets out a low whistle. 'You took down a carrier. That's not something many pilots can claim. 90,000 credits — and come back when you're ready for the last one.'"
  failure_text: "Vasquez stares at the tactical display. 'That carrier is still launching raids.'"
  preconditions:
    - kind: completed
      mission: bounty_story_4_catch
  offer:
    kind: npc_offer
    planet: barnard_station
    weight: 1.0
    building: mechanicshop
    approach: seek
  objective:
    kind: destroy_ships
    system: drift
    ship_type: pirate_carrier
    count: 1
    target_name: Pirate Carrier
    hostile: true
  completion_effects:
    - kind: pay
      credits: 90000

bounty_story_6:
  briefing: "Vasquez intercepts you near the shipyard, arms folded. 'This is the endgame, Commander. Two pirate carriers operating out of Alpha Centauri — they've been coordinating raids across the border for months. Eliminate both and we can start the paperwork for your carrier-class certification. 120,000 credits. This is the hardest contract we've ever posted. Good hunting.'"
  success_text: "Both carriers are wreckage. But sensors picked up a heavily shielded shuttle peeling off the flagship at the last moment — running silent for Pluto, deep in Sol's outer dark. 'That's the Pirate King,' Vasquez says quietly. 'The man who's been running all of this. Get him and it's over.'"
  failure_text: "Vasquez says quietly, 'They're still out there. The border won't hold much longer.'"
  preconditions:
    - kind: completed
      mission: bounty_story_5
  offer:
    kind: npc_offer
    planet: barnard_station
    weight: 1.0
    building: shipyard
    approach: seek
  objective:
    kind: destroy_ships
    system: alpha_centauri
    ship_type: pirate_carrier
    count: 2
    target_name: Pirate Carrier Group
    hostile: true
  completion_effects:
    - kind: pay
      credits: 120000

bounty_story_6_catch:
  briefing: "Track the Pirate King to Pluto. He'll be in the bar quarter — that's where every fugitive in Sol goes when they've got nowhere else. End this."
  success_text: "The Pirate King is drinking alone in a frost-rimed bar under Pluto's thin dome. He doesn't even reach for a weapon — just raises his glass. 'Took you long enough, Commander.' Vasquez comes over comms as he's cuffed: 'The border is secure for the first time in years. Carrier certification and turret clearance are yours — the full package. 50,000 credits on top. Every Federation officer in the fleet owes you a drink. The bounty board will keep posting carrier-class contracts if you're hungry for more.'"
  failure_text: "The Pirate King disappeared into Pluto's ice fields. He'll be rebuilding by next year."
  preconditions:
    - kind: completed
      mission: bounty_story_6
  offer:
    kind: auto
  objective:
    kind: catch_npc
    planet: pluto
    npc_name: "the Pirate King"
    building: bar
  completion_effects:
    - kind: pay
      credits: 50000
    - kind: grant_unlock
      name: carrier_license
    - kind: grant_unlock
      name: turret_license

# ── Espionage storyline ────────────────────────────────────────────────────
# A 15-mission arc offered by Federation Intelligence operating out of the
# Earth bar. Starts by hunting rebel spies who have infiltrated Federation
# worlds, escalates to intercepting rebel weapons-tech smugglers, then
# plunges the player into Rebel space for deep-cover meets with double
# agents and defectors. The final missions steal the schematics for the
# entire rebel fighter program. Completing the arc grants
# `rebel_weapons_license` (javelin missiles) and `rebel_ship_license`
# (rebel fighter + gunboat) — reverse-engineered from the stolen tech.
#
# Contains four combat missions, each with a `collect` requirement on the
# `weapons_tech` commodity, and six NPC objectives (3 catch_npc on
# Federation worlds, 3 meet_npc on Rebel worlds).

# Phase 1: Catch rebel infiltrators on Federation planets.

espionage_1:
  briefing: "A Federation Intelligence officer nurses a drink at the back of the Earth bar. She doesn't look up until you're seated. 'You clean? Good. A Sirius Cell operative has been lifting naval dispatches out of our Earth comm-center. He made our tail yesterday and he's gone to ground on the surface. Run him down before extraction — 8,000 credits. We don't exist, and neither does this conversation.'"
  success_text: "You corner the operative behind the market loading bays. He has a burst-transmitter in his hand — you get to it first. The officer's voice, three hours later: 'Clean work. Credits are in your account. Come back when you're ready for the next one.'"
  failure_text: "The operative made his extraction window. Whatever he had is already on a rebel data-lance halfway to Sirius."
  preconditions: []
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: bar
    approach: wait
  objective:
    kind: catch_npc
    planet: earth
    npc_name: "the Sirius Cell operative"
    building: market
  completion_effects:
    - kind: pay
      credits: 8000

espionage_2:
  briefing: "The officer is back in the same booth, no small talk. 'Their next cell is on Mars — a mining-data courier, looks like he's trying to slip belt-survey records out to a freighter due in two days. He hangs around the Mars market. 12,000 credits if you pick him up before that freighter clears customs.'"
  success_text: "The courier tries to run when he spots you — straight into a dead-end alley behind the market. He drops a data-sliver that Federation techs will spend a month decoding. 12,000 credits hits your account."
  failure_text: "The freighter lifted on schedule. Mars mining data is on its way to rebel shipyards."
  preconditions:
    - kind: completed
      mission: espionage_1
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: catch_npc
    planet: mars
    npc_name: "the rebel courier"
    building: market
  completion_effects:
    - kind: pay
      credits: 12000

espionage_3:
  briefing: "The officer slides a folder across the table — a dossier thick with photos. 'This one's their handler. He recruits couriers across half the Federation, and right now he's on Kepler-22b pretending to be a shipyard inspector. He's the prize, Commander. Get him and we crack the whole network. 22,000 credits.'"
  success_text: "You catch the handler at the shipyard, flanked by two fake aides. He doesn't even struggle — just sighs like a tired professor. 'Always the new faces,' he mutters. Federation Intelligence descends on his safe-house within the hour. Your account ticks up by 22,000 credits. 'Commander,' the officer says, 'you've earned a seat at the real table. The next briefing will be different.'"
  failure_text: "The handler slipped offworld. Every lead we had just went cold."
  preconditions:
    - kind: completed
      mission: espionage_2
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: catch_npc
    planet: kepler_22b
    npc_name: "the rebel handler"
    building: shipyard
  completion_effects:
    - kind: pay
      credits: 22000

# Phase 2: Intercept rebel weapons-tech smugglers (combat + delivery).

espionage_4:
  briefing: "'Here's the real work, Commander.' The officer pulls up a tactical display. 'The handler gave us a shipping schedule. Three rebel fighters are running stolen Federation weapons-tech through Alpha Centauri inside the next 48 hours. Destroy all three and salvage the cargo pods — we want the tech back. 30,000 credits.'"
  success_text: "Three rebel fighters, reduced to drifting wreckage. The cargo pods are intact — four units of weapons-tech, ours again. Head to Kepler-22b for the drop."
  failure_text: "The convoy made rebel space. That tech is already being reverse-engineered in Sirius."
  preconditions:
    - kind: completed
      mission: espionage_3
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: destroy_ships
    system: alpha_centauri
    ship_type: fighter
    count: 3
    target_name: Rebel Smuggling Wing
    hostile: true
    collect:
      commodity: weapons_tech
      quantity: 4
  completion_effects:
    - kind: pay
      credits: 30000

espionage_4_deliver:
  briefing: "Run the recovered weapons-tech to Kepler-22b for technical analysis. Kepler's labs will strip it and tell us what the rebels have."
  success_text: "The Kepler-22b technician signs for the shipment: 'This buys us six months.' 15,000 credits hit your account. The officer wants to see you back on Earth when you're ready for the next one."
  failure_text: "The recovered weapons-tech never made it to analysis."
  preconditions:
    - kind: completed
      mission: espionage_4
  offer:
    kind: auto
  objective:
    kind: land_on_planet
    planet: kepler_22b
  requires:
    - kind: has_cargo
      commodity: weapons_tech
      quantity: 4
  completion_effects:
    - kind: remove_cargo
      commodity: weapons_tech
      quantity: 4
    - kind: pay
      credits: 15000

espionage_5:
  briefing: "The officer looks grim. 'Kepler's people looked at what you brought in. The rebels have been building a missile program off our own designs — javelin-class tech. There's a bigger shipment moving through the Drift right now — three stolen Federation corvettes running cargo, six cargo units between them. Destroy them and recover everything. 45,000 credits.'"
  success_text: "Three corvettes, three broken hulls. Six units of weapons-tech in your hold, enough to fill a whole Kepler lab. Officer wants it back on Earth this time — she's running the analysis herself."
  failure_text: "The corvettes escaped the Drift. Our javelin program may be lost."
  preconditions:
    - kind: completed
      mission: espionage_4_deliver
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: destroy_ships
    system: drift
    ship_type: corvette
    count: 3
    target_name: Rebel Weapons Convoy
    hostile: true
    collect:
      commodity: weapons_tech
      quantity: 6
  completion_effects:
    - kind: pay
      credits: 45000

espionage_5_deliver:
  briefing: "Return the recovered weapons-tech to Earth for full analysis. Intelligence wants to see every circuit."
  success_text: "The officer runs a hand over the cargo crates like she's touching a holy relic. 'This is the whole rebel missile stack, Commander. Reverse-engineered against our own designs. You've earned javelin clearance — the schematics are yours to run.' 20,000 credits, plus the rebel weapons license."
  failure_text: "The shipment never reached Earth. The intelligence window has closed."
  preconditions:
    - kind: completed
      mission: espionage_5
  offer:
    kind: auto
  objective:
    kind: land_on_planet
    planet: earth
  requires:
    - kind: has_cargo
      commodity: weapons_tech
      quantity: 6
  completion_effects:
    - kind: remove_cargo
      commodity: weapons_tech
      quantity: 6
    - kind: pay
      credits: 20000
    - kind: grant_unlock
      name: rebel_weapons_license

# Phase 3: Deep cover in rebel space — meet informants, smuggle secrets.

espionage_6:
  briefing: "The officer's voice drops. 'We have an asset on Procyon Prime — deep cover, two years in. She has a package we can't move through normal channels. You'll dock at the Procyon Prime bar, look for a woman drinking alone. Codeword is \"east wind.\" Get in, get the intel, get out. This is rebel space, Commander. Procyon is a rebel capital. 25,000 credits.'"
  success_text: "The asset slides a data chit across the bar as she stands to leave. 'East wind's blowing harder every day. Tell her that.' She's gone before you can answer. 25,000 credits; the officer on Earth wants you back for debrief and the next contact."
  failure_text: "The asset's cover is blown. We lost her."
  preconditions:
    - kind: completed
      mission: espionage_5_deliver
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: meet_npc
    planet: procyon_prime
    npc_name: "the Procyon asset"
    building: bar
  completion_effects:
    - kind: pay
      credits: 25000

espionage_7:
  briefing: "'The asset's chit pointed us at a second contact — a rebel weapons engineer on Sirius-C who wants out. He's got design data for rebel fighter airframes. Meet him at the mechanic shop. He'll be the one pretending to fix a hauler. 20,000 credits on the meet, more on delivery.'"
  success_text: "The engineer pushes a sealed data-cartridge under a greasy hauler manifold and slides it to you with his boot. 'Everything I know. Get it home.' He won't make eye contact. 20,000 credits in your account — and your cargo hold just got heavier."
  failure_text: "The engineer missed his window. Every rebel counter-intel officer in Sirius is looking for him now."
  preconditions:
    - kind: completed
      mission: espionage_6
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: meet_npc
    planet: sirius_c
    npc_name: "the rebel engineer"
    building: mechanicshop
  completion_effects:
    - kind: pay
      credits: 20000

espionage_7_deliver:
  briefing: "Get the engineer's data-cartridge to Kepler-22b before rebel counter-intel tracks the leak. He gave you four units' worth of schematics — guard them."
  success_text: "Kepler's analysts look at the schematics and go quiet for a long time. 'This is half a rebel shipyard.' The officer authorizes 35,000 credits. 'We're close, Commander. One more trip into rebel space.'"
  failure_text: "The data-cartridge was lost. A life was spent for nothing."
  preconditions:
    - kind: completed
      mission: espionage_7
  offer:
    kind: auto
  start_effects:
    - kind: load_cargo
      commodity: weapons_tech
      quantity: 4
      reserved: true
  objective:
    kind: land_on_planet
    planet: kepler_22b
  requires:
    - kind: has_cargo
      commodity: weapons_tech
      quantity: 4
  completion_effects:
    - kind: remove_cargo
      commodity: weapons_tech
      quantity: 4
    - kind: pay
      credits: 35000

espionage_8:
  briefing: "The officer is pacing when you walk in. 'We have a problem. The rebels know the engineer defected — they've pulled an undercover frigate out of the Sirius fleet yard to hunt for whoever he leaked to. That's you, Commander. We're turning this around. Engage the frigate in Sirius before it ships out, break it open, and recover whatever weapons-tech they loaded for pursuit. 70,000 credits.'"
  success_text: "The rebel frigate folds under sustained fire. Eight units of weapons-tech drift free of the wreckage — pursuit ordnance they never got to use. Bring it home."
  failure_text: "The frigate escaped. It will find you eventually."
  preconditions:
    - kind: completed
      mission: espionage_7_deliver
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: destroy_ships
    system: sirius
    ship_type: frigate
    count: 1
    target_name: Rebel Counter-Intel Frigate
    hostile: true
    collect:
      commodity: weapons_tech
      quantity: 6
  completion_effects:
    - kind: pay
      credits: 70000

espionage_8_deliver:
  briefing: "The frigate's weapons-tech stash is worth more than the ship itself. Run it to Earth for Intelligence."
  success_text: "The officer signs for the shipment and pours two drinks. 'Sit down, Commander. There's one more operation, and it's the one we've been building toward.' 30,000 credits land in your account."
  failure_text: "The frigate's weapons-tech is lost."
  preconditions:
    - kind: completed
      mission: espionage_8
  offer:
    kind: auto
  objective:
    kind: land_on_planet
    planet: earth
  requires:
    - kind: has_cargo
      commodity: weapons_tech
      quantity: 6
  completion_effects:
    - kind: remove_cargo
      commodity: weapons_tech
      quantity: 6
    - kind: pay
      credits: 30000

# Phase 4: The endgame — steal the complete rebel fighter program.

espionage_9:
  briefing: "The officer doesn't sit down. 'Rigel Outpost. There is a rebel chief engineer there who has the complete airframe-and-powerplant schematics for the entire rebel fighter program — not fragments, the whole thing. He's flipping. We don't know why and we don't care. You meet him at the Rigel Outpost shipyard. Get the data. 40,000 credits on meet, another 100,000 on delivery. Don't come back empty.'"
  success_text: "The chief engineer meets you in a hangar bay under a stripped-down gunboat. He hands over a sealed schematics-core the size of your fist. 'Take it, take it. Go. They'll kill me if you stay another minute.' You go. 40,000 credits; now get out of Rigel alive."
  failure_text: "The chief engineer was extracted by rebel counter-intel. The full rebel fighter program stays rebel."
  preconditions:
    - kind: completed
      mission: espionage_8_deliver
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: meet_npc
    planet: rigel_outpost
    npc_name: "the rebel chief engineer"
    building: shipyard
  completion_effects:
    - kind: pay
      credits: 40000

espionage_10_escape:
  briefing: "Rebel counter-intel has the whole Sirius fleet hunting you. You'll pass through the Drift on your way home — and a rebel fighter wing will be waiting. Break through. Four rebel fighters. Pick up the escort's weapons-tech from the wreckage on your way out — it's the last piece Intelligence needs."
  success_text: "Four rebel fighters, four debris fields. Five units of salvaged weapons-tech in the hold, plus the chief engineer's schematics-core. The Drift falls silent behind you. Earth is next."
  failure_text: "The intercept wing caught you in the Drift. The schematics-core is rebel property again."
  preconditions:
    - kind: completed
      mission: espionage_9
  offer:
    kind: auto
  start_effects:
    - kind: load_cargo
      commodity: weapons_tech
      quantity: 3
      reserved: true
  objective:
    kind: destroy_ships
    system: drift
    ship_type: fighter
    count: 4
    target_name: Rebel Intercept Wing
    hostile: true
    collect:
      commodity: weapons_tech
      quantity: 5
  completion_effects:
    - kind: pay
      credits: 60000

espionage_final:
  briefing: "Bring the schematics-core and the salvaged weapons-tech home to Earth. Federation Intelligence is waiting."
  success_text: "The officer stares at the schematics-core on her desk like it's something holy. 'Commander — we just stole the entire rebel fighter program.' A senior admiral, whose face you won't remember tomorrow, walks in and hands you a full Federation clearance: rebel-ship operational license. 'You can fly their fighters now, Commander. We built ours off of theirs. The circle closes.' 100,000 credits, the rebel ship license, and the knowledge that you're the reason the border holds."
  failure_text: "The schematics-core was lost. Years of espionage work, gone."
  preconditions:
    - kind: completed
      mission: espionage_10_escape
  offer:
    kind: auto
  objective:
    kind: land_on_planet
    planet: earth
  requires:
    - kind: has_cargo
      commodity: weapons_tech
      quantity: 8
  completion_effects:
    - kind: remove_cargo
      commodity: weapons_tech
      quantity: 8
    - kind: pay
      credits: 100000
    - kind: grant_unlock
      name: rebel_ship_license

# ══════════════════════════════════════════════════════════════════════════════
# Free Frontier — "The Reaches"  (grants free_frontier_license at stage 1, so the
# player can buy the cheap militia hulls for the later defensive fights).
# Reached via the borderlands; gated on having a real combat ship.
# ══════════════════════════════════════════════════════════════════════════════
frontier_1:
  briefing: "A weather-beaten harbormaster corners you in the Halcyon free port. 'You fly like you can fight. Pirates are gutting our ice convoys — two corvettes, working the Halcyon lanes. Run them off and the Reaches won't forget it. 22,000, and I'll get you Coalition papers — our yards'll sell to you after that.'"
  success_text: "The harbormaster grips your hand. 'You're one of us now. Ceres yard's open to you. Come find me — there's more.'"
  failure_text: "The convoys burn. The harbormaster won't look at you."
  preconditions:
    - kind: completed
      mission: pirate_bounty_sol
  offer:
    kind: npc_offer
    planet: halcyon_port
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: destroy_ships
    system: halcyon
    ship_type: pirate_corvette
    count: 2
    target_name: Reach Raiders
    hostile: true
  completion_effects:
    - kind: pay
      credits: 22000
    - kind: grant_unlock
      name: free_frontier_license
frontier_2:
  briefing: "The harbormaster slides a manifest over. 'Ceres colony's hungry — a Federation cutter impounded their grain over a tariff. We loaded a quiet 15 units. Get it down to Ceres before anyone counts heads. 26,000.'"
  success_text: "Ceres eats tonight. 26,000 credits, and no questions."
  failure_text: "The grain never made it. Ceres tightens its belt again."
  preconditions:
    - kind: completed
      mission: frontier_1
  offer:
    kind: npc_offer
    planet: halcyon_port
    weight: 1.0
    building: market
    approach: seek
  start_effects:
    - kind: load_cargo
      commodity: food
      quantity: 15
      reserved: true
  objective:
    kind: land_on_planet
    planet: ceres
  requires:
    - kind: has_cargo
      commodity: food
      quantity: 15
  completion_effects:
    - kind: remove_cargo
      commodity: food
      quantity: 15
    - kind: pay
      credits: 26000
frontier_3:
  briefing: "'The Reaches won't hold unless the holdouts band together. There's a harbormaster on Kuiper Reach who won't answer my calls — but she'll meet a pilot who proved themselves. Find her in the Kuiper Haven bar. Codeword: open lanes.'"
  success_text: "The Kuiper harbormaster hears you out, then nods slowly. 'Alright. The Coalition stands. Tell them Kuiper's in.' 24,000 credits."
  failure_text: "She slipped offworld before you arrived. The Coalition fractures."
  preconditions:
    - kind: completed
      mission: frontier_2
  offer:
    kind: npc_offer
    planet: halcyon_port
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: meet_npc
    planet: kuiper_haven
    npc_name: "the Kuiper harbormaster"
    building: bar
  completion_effects:
    - kind: pay
      credits: 24000
frontier_4:
  briefing: "The harbormaster's voice is tight over comms. 'A Bastion raiding column is bearing down on Ceres Freehold — three iron hulls, no mercy in them. The whole Coalition is watching. Hold the line. 50,000, and you'll have earned every credit.'"
  success_text: "The Bastion column breaks against the Freehold's guns — and your own. Ceres holds. 'The Reaches are free another day, Captain,' the harbormaster says. 'Because of you.' 50,000 credits."
  failure_text: "Ceres Freehold burns. The Coalition will not forget who failed them."
  preconditions:
    - kind: completed
      mission: frontier_3
  offer:
    kind: npc_offer
    planet: ceres
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: destroy_ships
    system: ceres_freehold
    ship_type: bastion_guard
    count: 3
    target_name: Bastion Raiders
    hostile: true
  completion_effects:
    - kind: pay
      credits: 50000

# ══════════════════════════════════════════════════════════════════════════════
# Helios Combine — "Quarterly Returns"  (grants helios_license at stage 1).
# ══════════════════════════════════════════════════════════════════════════════
helios_1:
  briefing: "A Helios recruiter in a spotless suit finds you at Helios Prime. 'We headhunt talent. Pirates are circling an automated ore convoy near the Foundry — two of them. Clear them; the shareholders thank you. 22,000, plus a Combine clearance — our drone hulls become available to you.'"
  success_text: "'Efficient. The Combine likes efficient.' 22,000 credits, and your Helios clearance is live."
  failure_text: "The convoy is lost. The recruiter has already moved on to the next candidate."
  preconditions:
    - kind: completed
      mission: pirate_bounty_sol
  offer:
    kind: npc_offer
    planet: helios_prime
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: destroy_ships
    system: the_foundry
    ship_type: pirate_corvette
    count: 2
    target_name: Convoy Raiders
    hostile: true
  completion_effects:
    - kind: pay
      credits: 22000
    - kind: grant_unlock
      name: helios_license
helios_2:
  briefing: "The recruiter is unbothered. 'A delivery. 12 units of weapons-parts to Procyon Prime — yes, the Rebels. We sell to everyone; that's the whole point. 28,000, and don't ask what they do with it.'"
  success_text: "The Rebels take delivery without comment. 28,000 credits. The Combine arms both sides and bills both sides."
  failure_text: "The shipment was lost. The Combine notes the inefficiency."
  preconditions:
    - kind: completed
      mission: helios_1
  offer:
    kind: npc_offer
    planet: helios_prime
    weight: 1.0
    building: market
    approach: seek
  start_effects:
    - kind: load_cargo
      commodity: weapons_parts
      quantity: 12
      reserved: true
  objective:
    kind: land_on_planet
    planet: procyon_prime
  requires:
    - kind: has_cargo
      commodity: weapons_parts
      quantity: 12
  completion_effects:
    - kind: remove_cargo
      commodity: weapons_parts
      quantity: 12
    - kind: pay
      credits: 28000
helios_3:
  briefing: "The recruiter's smile thins. 'A problem. Free Frontier organizers seized one of our Foundry refineries over wages. Their ringleader is hiding in the Foundry station. Bring him in — quietly — before the next shareholder call. 32,000.'"
  success_text: "You pin the organizer in a Foundry stairwell. He spits at your boots. The Combine's credits — 32,000 — hit your account before he's even processed."
  failure_text: "The organizer rallied the workers and vanished. The strike spreads."
  preconditions:
    - kind: completed
      mission: helios_2
  offer:
    kind: npc_offer
    planet: helios_prime
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: catch_npc
    planet: foundry_station
    npc_name: "the co-op organizer"
    building: market
  completion_effects:
    - kind: pay
      credits: 32000
helios_4:
  briefing: "'A rival cartel is undercutting us in the Drift. Their flagship coordinates the whole operation. Cripple it and they'll sell to us by morning. 46,000. This is how the Combine wins — not with flags, with leverage.'"
  success_text: "The rival flagship drifts dead. By dawn the cartel has accepted the Combine's terms. 46,000 credits. 'You have a future here, Director,' the recruiter says."
  failure_text: "The rival escaped. The Combine's margin slips a point."
  preconditions:
    - kind: completed
      mission: helios_3
  offer:
    kind: npc_offer
    planet: helios_prime
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: destroy_ships
    system: drift
    ship_type: freighter
    count: 1
    target_name: Rival Cartel Flagship
    hostile: true
  completion_effects:
    - kind: pay
      credits: 46000

# ══════════════════════════════════════════════════════════════════════════════
# Fed Bastion — "Schism" (hardliner path; grants bastion_license at stage 1).
# Gated deeper — you need a real warship to reach the deep-west fortress.
# ══════════════════════════════════════════════════════════════════════════════
bastion_1:
  briefing: "An iron-faced officer meets you at Iron March. 'The Federation has gone soft. We have not. Prove you understand: there are Rebel ships in the Drift, fat and unpunished. Two of them. End them. 25,000 — and the Bastion will arm you as one of our own.'"
  success_text: "'Order is a thing you enforce.' The officer uploads Bastion clearance — our hulls and our guns are yours. 25,000 credits."
  failure_text: "'Weakness.' The officer turns away."
  preconditions:
    - kind: completed
      mission: bounty_story_2_catch
  offer:
    kind: npc_offer
    planet: iron_march
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: destroy_ships
    system: drift
    ship_type: rebel_fighter
    count: 2
    target_name: Rebel Interlopers
    hostile: true
  completion_effects:
    - kind: pay
      credits: 25000
    - kind: grant_unlock
      name: bastion_license
bastion_2:
  briefing: "'The forge at the Anvil runs day and night, but the front needs shells. Run 14 units of weapons-parts to Bastion itself. The cause does not wait. 30,000.'"
  success_text: "The Bastion quartermaster signs for the munitions without a word. 30,000 credits."
  failure_text: "The shipment never arrived. Somewhere, a siege line goes quiet."
  preconditions:
    - kind: completed
      mission: bastion_1
  offer:
    kind: npc_offer
    planet: iron_march
    weight: 1.0
    building: market
    approach: seek
  start_effects:
    - kind: load_cargo
      commodity: weapons_parts
      quantity: 14
      reserved: true
  objective:
    kind: land_on_planet
    planet: bastion
  requires:
    - kind: has_cargo
      commodity: weapons_parts
      quantity: 14
  completion_effects:
    - kind: remove_cargo
      commodity: weapons_parts
      quantity: 14
    - kind: pay
      credits: 30000
bastion_3:
  briefing: "The officer's jaw is set. 'The lawful Federation calls us traitors. So be it. A Federation patrol is pushing into the border to 'contain' us — two hulls. Break them. We do not negotiate with the soft. 40,000.'"
  success_text: "The Federation patrol is wreckage. 'The old Federation is dying,' the officer says. 'We are what replaces it.' 40,000 credits."
  failure_text: "The patrol held. The lawful fleet grows bolder."
  preconditions:
    - kind: completed
      mission: bastion_2
  offer:
    kind: npc_offer
    planet: bastion
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: destroy_ships
    system: barnard
    ship_type: fed_patrol
    count: 2
    target_name: Federation Containment Patrol
    hostile: true
  completion_effects:
    - kind: pay
      credits: 40000
bastion_4:
  briefing: "'The endgame, Captain. We move on a frontier world that shelters Rebel sympathizers. Three defenders stand in the way. Break them and the Bastion's reach extends another system. 55,000. This is the order we will build, whatever the cost.'"
  success_text: "The defenders fall. The Bastion's iron writ spreads. The officer salutes you as kin. 55,000 credits — and a reputation soaked in it."
  failure_text: "The defenders held the line. The splinter's advance stalls."
  preconditions:
    - kind: completed
      mission: bastion_3
  offer:
    kind: npc_offer
    planet: bastion
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: destroy_ships
    system: the_anvil
    ship_type: frontier_harvester
    count: 3
    target_name: Frontier Defenders
    hostile: true
  completion_effects:
    - kind: pay
      credits: 55000

# ══════════════════════════════════════════════════════════════════════════════
# Artifact Order — "The Reliquary" (grants artifact_order_license at stage 1,
# precursor_tech_license at the finale). The road into the deep — gated late.
# ══════════════════════════════════════════════════════════════════════════════
order_1:
  briefing: "A robed proctor watches you in the Tau Ceti ruins — and approaches only because you did not loot. 'Smugglers strip the sacred sites for trinkets. Three of them defile a ruin now. Stop them, and recover what they have taken — the relics are not yours, nor theirs. 25,000. The Order will know you then.'"
  success_text: "The looters are scattered; the relics recovered, unspoiled. The proctor inclines his head. 'You may walk in the Order now. Our reliquary-hulls and our relic-arms are open to the faithful.' 25,000 credits."
  failure_text: "The relics are gone, sold for scrap-price. The proctor mourns."
  preconditions:
    - kind: completed
      mission: bounty_story_4_catch
  offer:
    kind: npc_offer
    planet: tau_ceti_4
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: destroy_ships
    system: tau_ceti
    ship_type: pirate_corvette
    count: 3
    target_name: Relic Looters
    hostile: true
    collect:
      commodity: artifacts
      quantity: 3
  completion_effects:
    - kind: pay
      credits: 25000
    - kind: grant_unlock
      name: artifact_order_license
order_2:
  briefing: "The proctor speaks softly. 'A Federation scholar on Kepler-22b has lost faith in the museum-vaults. He wishes to bring his knowledge to us. Meet him; assure him of safe passage. He will be in the Kepler market, afraid. 28,000.'"
  success_text: "The scholar weeps with relief and presses his life's work into your hands. 'The Order will keep it holy.' 28,000 credits."
  failure_text: "The scholar's nerve broke; he fled back to his vaults."
  preconditions:
    - kind: completed
      mission: order_1
  offer:
    kind: npc_offer
    planet: sanctum
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: meet_npc
    planet: kepler_22b
    npc_name: "the defecting scholar"
    building: market
  completion_effects:
    - kind: pay
      credits: 28000
order_3:
  briefing: "The proctor's calm cracks. 'The Helios Combine excavates a sacred site at the Foundry to PATENT what they find. Blasphemy beyond words. Drive off their security and seize their lead engineer before the relics are crated north. 42,000. They would make a product of the divine.'"
  success_text: "The Helios dig is shattered; their engineer in your hold. The proctor's voice shakes with fury and gratitude both. 'The relics are safe. The Combine will pay for this — and you helped see it done.' 42,000 credits."
  failure_text: "The relics went north in Helios crates. Somewhere a patent is filed on a god."
  preconditions:
    - kind: completed
      mission: order_2
  offer:
    kind: npc_offer
    planet: sanctum
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: destroy_ships
    system: the_foundry
    ship_type: helios_enforcer
    count: 2
    target_name: Helios Security
    hostile: true
  completion_effects:
