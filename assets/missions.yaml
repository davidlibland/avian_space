order_5:
  briefing: "The proctor is pale. 'Something in the Rift has STIRRED. Probes emerge from the dark — the heralds of the sleeper. They come for Sanctum. We hold the line at the Threshold, or we lose everything. Three of them, for now. And Captain — the Order will entrust you with a relic-weapon stable enough to wield. 60,000.'"
  success_text: "The probes are dust. The proctor presses a humming relic-core into your hands: 'Exotic-lance clearance — the first stable Precursor weapon in mortal hands. You will need it for what comes.' 60,000 credits, and precursor-tech clearance."
  failure_text: "The probes reached Sanctum. The vigil is broken; the sleeper stirs unopposed."
  preconditions:
