      credits: 42000
order_4:
  briefing: "'A relic must reach Sanctum's vaults — the most sacred we have recovered. The road past the Threshold is watched by everything that wants it. Carry it. Guard it with your life. 45,000.'"
  success_text: "The relic is sealed in Sanctum's deepest vault. The proctor blesses your hull. 'You have carried the divine and not faltered.' 45,000 credits."
  failure_text: "The relic was taken on the road. A wound that will not close."
