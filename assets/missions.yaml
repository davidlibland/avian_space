espionage_5_deliver:
  briefing: "Return the recovered weapons-tech to Earth for full analysis. Intelligence wants to see every circuit."
  success_text: "The officer runs a hand over the cargo crates like she's touching a holy relic. 'This is the whole rebel missile stack, Commander. Reverse-engineered against our own designs. You've earned javelin clearance — the schematics are yours to run.' 20,000 credits, plus the rebel weapons license."
  failure_text: "The shipment never reached Earth. The intelligence window has closed."
