# ══════════════════════════════════════════════════════════════════════════════
# Fed Bastion — "Schism" (hardliner path; grants bastion_license at stage 1).
# Gated deeper — you need a real warship to reach the deep-west fortress.
# ══════════════════════════════════════════════════════════════════════════════
bastion_1:
  faction: Bastion
  briefing: "An iron-faced officer meets you at Iron March. 'The Federation has gone soft. We have not. Prove you understand: there are Rebel ships in the Drift, fat and unpunished. Two of them. End them. 9,000 — and the Bastion will arm you: our work hulls and the chaingun they mount. The warships you earn by proving your spine.'"
  success_text: "'Order is a thing you enforce.' The officer uploads Bastion clearance — the ore-dredger, the collier, and the chaingun are yours at any Anvil yard. The warships come one at a time, as you earn them. 9,000 credits."
  failure_text: "'Weakness.' The officer turns away."
  preconditions:
    - kind: completed
      mission: bounty_story_2_catch
  offer:
    kind: npc_offer
    planet: iron_march
    weight: 1.0
    building: bar
    approach: seek
    npc: bastion_strake
  objective:
    kind: destroy_ships
    system: drift
    ship_type: rebel_fighter
    count: 2
    target_name: Rebel Interlopers
    hostile: true
  completion_effects:
    - kind: pay
      credits: 9000
    - kind: grant_unlock
      name: bastion_license
bastion_2:
  faction: Bastion
  briefing: "'The forge at the Anvil runs day and night, but the front needs shells. Run 14 units of weapons-parts to Bastion itself. The cause does not wait. 12,000.'"
  success_text: "The Bastion quartermaster signs for the munitions without a word. 12,000 credits — and clears you for the Guard, the Bastion's frontline fighter."
  failure_text: "The shipment never arrived. Somewhere, a siege line goes quiet."
  preconditions:
    - kind: completed
      mission: bastion_1
  offer:
    kind: npc_offer
    planet: iron_march
    weight: 1.0
    building: market
    approach: seek
    npc: bastion_strake
  start_effects:
    - kind: load_cargo
      commodity: weapons_parts
      quantity: 14
      reserved: true
  objective:
    kind: land_on_planet
    planet: bastion
  requires:
    - kind: has_cargo
      commodity: weapons_parts
      quantity: 14
  completion_effects:
    - kind: remove_cargo
      commodity: weapons_parts
      quantity: 14
    - kind: pay
      credits: 12000
    - kind: grant_unlock
      name: bastion_guard_license
bastion_3:
  faction: Bastion
  briefing: "The officer's jaw is set. 'The lawful Federation calls us traitors. So be it. A Federation patrol is pushing into Barnard to 'contain' us — two hulls. Break them. We do not negotiate with the soft. 16,000.'"
  success_text: "The Federation patrol is wreckage. 'The old Federation is dying,' the officer says. 'We are what replaces it.' 16,000 credits — and the Lance, our turret-gunship, with the chaingun turret it carries."
  failure_text: "The patrol held. The lawful fleet grows bolder."
  preconditions:
    - kind: completed
      mission: bastion_2
  offer:
    kind: npc_offer
    planet: bastion
    weight: 1.0
    building: bar
    approach: seek
    npc: bastion_strake
  objective:
    kind: destroy_ships
    system: barnard
    ship_type: fed_patrol
    count: 2
    target_name: Federation Containment Patrol
    hostile: true
  completion_effects:
    - kind: pay
      credits: 16000
    - kind: grant_unlock
      name: bastion_lance_license
bastion_4:
  faction: Bastion
  briefing: "'The endgame, Captain. We move on a frontier world that shelters Rebel sympathizers. Three defenders stand in the way. Break them and the Bastion's reach extends another system. 22,000. This is the order we will build, whatever the cost.' A pair of Bastion guards will hold your flanks."
  success_text: "The defenders fall. The Bastion's iron writ spreads. The officer salutes you as kin. 22,000 credits — and the keys to a siege monitor, siege-cannon mounted, with a reputation soaked in it."
  failure_text: "The defenders held the line. The splinter's advance stalls."
  preconditions:
    - kind: completed
      mission: bastion_3
  offer:
    kind: npc_offer
    planet: bastion
    weight: 1.0
    building: bar
    approach: seek
    npc: bastion_strake
  objective:
    kind: destroy_ships
    system: the_anvil
    ship_type: frontier_harvester
    count: 3
    target_name: Frontier Defenders
    hostile: true
  completion_effects:
    - kind: pay
      credits: 22000
    - kind: grant_unlock
      name: siege_monitor_license
    - kind: shift_influence
      system: the_anvil
      faction: Bastion
      delta: 0.1
  squadron: [bastion_guard, bastion_guard]
bastion_5:
  faction: Bastion
  briefing: "The officer's voice is iron. 'The endgame the soft never had the will for, Captain. The Coalition has fielded a monitor to break our advance — and behind it, everything they have left. We answer with the Iron Dreadnought, the heaviest hull the forge has ever struck. Fly it, take theirs out, shatter their line. 32,000. After this, there is only the order we impose.' A lance and a guard fly at your wing — the Column moves as one."
  success_text: "The Coalition monitor breaks apart against the Dreadnought's broadside. The forge opens its heaviest hull to you — the Iron Dreadnought. 32,000 credits. 'You are the Bastion now,' the officer says."
  failure_text: "The Coalition line held, and the Bastion's advance breaks on the rocks of the Reaches."
  preconditions:
    - kind: completed
      mission: bastion_4
  offer:
    kind: npc_offer
    planet: bastion
    weight: 1.0
    building: bar
    approach: seek
    npc: bastion_strake
  objective:
    kind: destroy_ships
    system: the_anvil
    ship_type: frontier_monitor
    count: 1
    target_name: Coalition Monitor
    hostile: true
  completion_effects:
    - kind: pay
      credits: 32000
    - kind: grant_unlock
      name: iron_dreadnought_license
    - kind: shift_influence
      system: the_anvil
      faction: Bastion
      delta: 0.12
  squadron: [bastion_lance, bastion_guard]

# ══════════════════════════════════════════════════════════════════════════════
# Artifact Order — "The Reliquary" (grants artifact_order_license at stage 1,
# precursor_tech_license at the finale). The road into the deep — gated late.
# ══════════════════════════════════════════════════════════════════════════════
order_1:
  faction: Order
  briefing: "A robed proctor watches you in the Tau Ceti ruins — and approaches only because you did not loot. 'Smugglers strip the sacred sites for trinkets. Three of them defile a ruin now. Stop them, and recover what they have taken — the relics are not yours, nor theirs. 9,000. The Order will know you then.'"
  success_text: "The looters are scattered; the relics recovered, unspoiled. The proctor inclines his head. 'You may walk in the Order now. Our pilgrim hulls — the quarryman and the almoner — and the relic-lance they bear are open to the faithful. The war-relics you earn by deeper devotion.' 9,000 credits."
  failure_text: "The relics are gone, sold for scrap-price. The proctor mourns."
  preconditions:
    - kind: completed
      mission: bounty_story_4_catch
  offer:
    kind: npc_offer
    planet: tau_ceti_4
    weight: 1.0
    building: bar
    approach: seek
    npc: order_proctor
  objective:
    kind: destroy_ships
    system: tau_ceti
    ship_type: pirate_corvette
    count: 3
    target_name: Relic Looters
    hostile: true
    collect:
      commodity: artifacts
      quantity: 3
  completion_effects:
    - kind: pay
      credits: 9000
    - kind: grant_unlock
      name: artifact_order_license
order_2:
  faction: Order
  briefing: "The proctor speaks softly. 'A Federation scholar on Kepler-22b has lost faith in the museum-vaults. He wishes to bring his knowledge to us. Meet him; assure him of safe passage. He will be in the Kepler market, afraid. 11,000.'"
  success_text: "The scholar weeps with relief and presses his life's work into your hands. 'The Order will keep it holy.' 11,000 credits — and the proctor anoints you for the Acolyte, the Order's first war-hull."
  failure_text: "The scholar's nerve broke; he fled back to his vaults."
  preconditions:
    - kind: completed
      mission: order_1
  offer:
    kind: npc_offer
    planet: sanctum
    weight: 1.0
    building: bar
    approach: seek
    npc: order_proctor
  objective:
    kind: meet_npc
    planet: kepler_22b
    npc_name: "the defecting scholar"
    building: market
  completion_effects:
    - kind: pay
      credits: 11000
    - kind: grant_unlock
      name: order_acolyte_license
order_3:
  faction: Order
  briefing: "The proctor's calm cracks. 'The Helios Combine excavates a sacred site at the Foundry to PATENT what they find. Blasphemy beyond words. Drive off their security and seize their lead engineer before the relics are crated north. 17,000. They would make a product of the divine.'"
  success_text: "The Helios dig is shattered; their engineer in your hold. The proctor's voice shakes with fury and gratitude both. 'The relics are safe. The Combine will pay for this — and you helped see it done.' 17,000 credits — and the Censer is consecrated to you, its censer-charges with it."
  failure_text: "The relics went north in Helios crates. Somewhere a patent is filed on a god."
  preconditions:
    - kind: completed
      mission: order_2
  offer:
    kind: npc_offer
    planet: sanctum
    weight: 1.0
    building: bar
    approach: seek
    npc: order_proctor
  objective:
    kind: destroy_ships
    system: the_foundry
    ship_type: helios_enforcer
    count: 2
    target_name: Helios Security
    hostile: true
  completion_effects:
    - kind: pay
      credits: 17000
    - kind: grant_unlock
      name: order_censer_license
order_4:
  faction: Order
  briefing: "'A relic must reach the vaults at the Cloister — the most sacred we have recovered. The road past the Threshold is watched by everything that wants it. Carry it to the Cloister and guard it with your life. 18,000.'"
  success_text: "The relic is sealed in Sanctum's deepest vault. The proctor blesses your hull. 'You have carried the divine and not faltered.' 18,000 credits — and the Reliquary, the Order's heavy cruiser, is entrusted to you."
  failure_text: "The relic was taken on the road. A wound that will not close."
  preconditions:
    - kind: completed
      mission: order_3
  offer:
    kind: npc_offer
    planet: sanctum
    weight: 1.0
    building: bar
    approach: seek
    npc: order_proctor
  start_effects:
    - kind: load_cargo
      commodity: artifacts
      quantity: 4
      reserved: true
  objective:
    kind: land_on_planet
    planet: cloister
  requires:
    - kind: has_cargo
      commodity: artifacts
      quantity: 4
  completion_effects:
    - kind: remove_cargo
      commodity: artifacts
      quantity: 4
    - kind: pay
      credits: 18000
    - kind: grant_unlock
      name: order_reliquary_license
order_5:
  faction: Order
  briefing: "The proctor is pale. 'Something in the Rift has STIRRED. Probes emerge from the dark — the heralds of the sleeper. They come for Sanctum. We hold the line at the Threshold, or we lose everything. Three of them, for now. And Captain — the Order will entrust you with a relic-weapon stable enough to wield. 24,000.'"
  success_text: "The probes are dust. The proctor presses a humming relic-core into your hands: 'Exotic-lance clearance — the first stable Precursor weapon in mortal hands. You will need it for what comes — and the Cathedral, the Order's flagship, its relic-turret with it. Go armored in faith.' 24,000 credits, plus cathedral and precursor-tech clearance."
  failure_text: "The probes reached Sanctum. The vigil is broken; the sleeper stirs unopposed."
  preconditions:
    - kind: completed
      mission: order_4
  offer:
    kind: npc_offer
    planet: sanctum
    weight: 1.0
    building: bar
    approach: seek
    npc: order_proctor
  objective:
    kind: destroy_ships
    system: the_threshold
    ship_type: precursor_seeker
    count: 3
    target_name: Precursor Heralds
    hostile: true
  completion_effects:
    - kind: pay
      credits: 24000
    - kind: grant_unlock
      name: order_cathedral_license
    - kind: grant_unlock
      name: precursor_tech_license

# ══════════════════════════════════════════════════════════════════════════════
# "The Rift Awakens" — cross-faction endgame (needs the Order's exotic-lance + a
# capital-class hull). The hardest content in the game.
# ══════════════════════════════════════════════════════════════════════════════
rift_1:
  faction: Precursor
  briefing: "Federation Intelligence, the Order, and the Free Frontier speak as one for the first time in history: the Rift is waking. Two Sentinels guard the way into the deep. Break them. There is no precedent for what you are about to do. 35,000. The coalition sends a Federation patrol and an Order acolyte to fly at your side."
  success_text: "The Sentinels shatter into drifting violet light. The way into the Rift is open. 35,000 credits — and silence on every comm channel."
  failure_text: "The Sentinels held. The deep stays sealed — for now."
  preconditions:
    - kind: completed
      mission: order_5
  offer:
    kind: npc_offer
    planet: threshold_watch
    weight: 1.0
    building: bar
    approach: seek
    npc: rift_envoy
  objective:
    kind: destroy_ships
    system: the_rift
    ship_type: precursor_sentinel
    count: 2
    target_name: Rift Sentinels
    hostile: true
  completion_effects:
    - kind: pay
      credits: 35000
  squadron: [fed_patrol, order_acolyte]
rift_2:
  faction: Precursor
  briefing: "A Harbinger — a roused hunter-form — has crossed into the Silence, burning toward the inhabited galaxy along the exotic-matter veins. If it passes, nothing the factions have will stop it. End it here. 45,000. A joint wing jumps with you — a Federation destroyer, an Order censer, a Frontier skiff."
  success_text: "The Harbinger is unmade. The veins fall quiet. Only the sleeper remains. 45,000 credits."
  failure_text: "The Harbinger slipped past you into the dark, toward home."
  preconditions:
    - kind: completed
      mission: rift_1
  offer:
    kind: npc_offer
    planet: threshold_watch
    weight: 1.0
    building: bar
    approach: seek
    npc: rift_envoy
  objective:
    kind: destroy_ships
    system: the_silence
    ship_type: precursor_harbinger
    count: 1
    target_name: The Harbinger
    hostile: true
  completion_effects:
    - kind: pay
      credits: 45000
  squadron: [fed_destroyer, order_censer, frontier_skiff]
rift_final:
  faction: Precursor
  briefing: "It is in the Seedbed, at the bottom of the deep: the Sleeper. The thing that built the ruins, that seeded the exotic matter, that the Order calls a god. It is awake now, and it is vast. Every faction you have ever flown for stands behind you. End it. 120,000 — though credits will mean little if you fail. Everything the coalition can spare jumps with you: destroyer, patrol, reliquary, monitor."
  success_text: "The Sleeper folds in on itself and is gone, a wound in space closing behind it. The Rift falls silent — truly silent — for the first time in millions of years. Across the galaxy, a Federation officer, a Rebel commander, a frontier harbormaster, and a robed proctor all exhale at once. You did this. 120,000 credits, and a name that outlives you."
  failure_text: "The Sleeper endures. The deep breathes out, and the veins begin to glow toward home."
  preconditions:
    - kind: completed
      mission: rift_2
  offer:
    kind: npc_offer
    planet: threshold_watch
    weight: 1.0
    building: bar
    approach: seek
    npc: rift_envoy
  objective:
    kind: destroy_ships
    system: the_seedbed
    ship_type: precursor_sleeper
    count: 1
    target_name: The Sleeper
    hostile: true
  completion_effects:
    - kind: pay
      credits: 120000
    - kind: grant_unlock
      name: carrier_license
    - kind: grant_unlock
      name: turret_license
    - kind: grant_unlock
      name: precursor_ship_license
  squadron: [fed_destroyer, fed_patrol, order_reliquary, frontier_monitor]

# ══════════════════════════════════════════════════════════════════════════════
# THE WEIGHT OF ORDER — Federation governance arc (Director Sato, Earth)
# A third Federation face beside the navy and intelligence: the cost of imposing
# order. Opens with mercy, tightens into the grey, ends commanding the Drift
# pacification. Grants the Federation capital hardware no other arc unlocks:
# federation_ship_license, federation_capital_license, fed_carrier_license.
# Gated behind bounty_story_2_catch (an established Federation contractor).
# ══════════════════════════════════════════════════════════════════════════════

weight_of_order_1:
  faction: Federation
  briefing: "Director Sato of the Earth governance office finds you at the market. 'Pilot. Europa is under plague quarantine and the relief convoys won't cross the cordon. I have ten units of medical supplies and no one willing to run them. The Federation does not abandon its own. 4,500 credits — go.'"
  success_text: "Europa's med-techs swarm the crates before your ramp is down. Sato's voice, later: 'You did a good thing today. Remember that it was the Federation that sent you. Come back — there is harder work.'"
  failure_text: "The supplies never reached Europa. Sato does not call again for a while."
  preconditions:
    - kind: completed
      mission: bounty_story_2_catch
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: market
    approach: seek
  start_effects:
    - kind: load_cargo
      commodity: medical_supplies
      quantity: 10
      reserved: true
  objective:
    kind: land_on_planet
    planet: europa
  requires:
    - kind: has_cargo
      commodity: medical_supplies
      quantity: 10
  completion_effects:
    - kind: remove_cargo
      commodity: medical_supplies
      quantity: 10
    - kind: pay
      credits: 4500

weight_of_order_2:
  faction: Federation
  briefing: "Sato's tone is harder now. 'Barnard reports armed ships running unlicensed cargo past the customs cordon — smugglers, undercutting every taxpaying hauler in the system. Some say they're just hungry Independents. The law does not have a clause for hungry, Pilot. Clear them. 7,000 credits, and a Federation warship certification when it's done.'"
  success_text: "The last 'smuggler' breaks apart against your guns. One of them was barely armed. Sato uploads your federation ship license without comment. 'Order is not always comfortable. It is always necessary.'"
  failure_text: "The smuggler ring still runs the Barnard cordon, and your certification stays locked."
  preconditions:
    - kind: completed
      mission: weight_of_order_1
  offer:
    kind: auto
  objective:
    kind: destroy_ships
    system: barnard
    ship_type: pirate_corvette
    count: 3
    target_name: "Cordon Runner"
    hostile: true
  completion_effects:
    - kind: pay
      credits: 7000
    - kind: grant_unlock
      name: federation_ship_license
    - kind: grant_unlock
      name: proton_beam_license
    - kind: grant_unlock
      name: federation_weapons_license

weight_of_order_3:
  faction: Federation
  briefing: "'Tau Ceti 2 sold a vault of pre-colonial artifacts on the black market to buy food during the blockade,' Sato says. 'They were Federation heritage. The administrator who authorized the sale is still on-world. Go to the market and make her account for it — recover what you can. 8,000 credits.'"
  success_text: "The administrator hands over a manifest, her jaw tight. 'We were starving.' You log it anyway. Sato: 'You begin to see the weight of it. Good.'"
  failure_text: "The administrator and the manifest both vanish into Tau Ceti's under-levels."
  preconditions:
    - kind: completed
      mission: weight_of_order_2
  offer:
    kind: auto
  objective:
    kind: meet_npc
    planet: tau_ceti_2
    npc_name: "Administrator Reyes"
    building: market
  completion_effects:
    - kind: pay
      credits: 8000

weight_of_order_4:
  faction: Federation
  briefing: "'A tax-revolt is brewing on Pluto, and its ringleader is hiding in the shipyard district,' Sato says. 'Catch him. What happens after is your call — turn him in, or let him slip. The Federation only requires that the revolt ends. 10,000 credits.'"
  success_text: "You corner the ringleader by the mechanic's bay. He doesn't run. 'You really think order is the same as justice?' Whatever you decide, the revolt loses its head. Sato: 'There is one last thing, and it is the largest.'"
  failure_text: "The ringleader makes orbit and the revolt spreads to three more moons."
  preconditions:
    - kind: completed
      mission: weight_of_order_3
  offer:
    kind: auto
  objective:
    kind: catch_npc
    planet: pluto
    npc_name: "the revolt's ringleader"
    building: mechanicshop
  completion_effects:
    - kind: pay
      credits: 10000

weight_of_order_5:
  faction: Federation
  briefing: "Sato meets you at the Earth shipyard, and an admiral stands beside her. 'Pilot — the pacification of the Drift is authorized, and you will lead it. Two pirate carriers anchor the borderland havens. Break them and Federation writ runs to the frontier at last. 55,000 credits, and a capital-class commission: the destroyer and the carrier yards open to you.'"
  success_text: "The second carrier goes dark and the Drift is, for now, Federation space. Sato watches the wreck fields. 'We won. I keep waiting to feel it.' Your capital and carrier certifications come through: the fed_destroyer and fed_carrier are yours to command."
  failure_text: "The pacification fleet falls back from the Drift, and the havens hold."
  preconditions:
    - kind: completed
      mission: weight_of_order_4
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: shipyard
    approach: seek
  objective:
    kind: destroy_ships
    system: drift
    ship_type: pirate_carrier
    count: 2
    target_name: "Haven Carrier"
    hostile: true
  completion_effects:
    - kind: pay
      credits: 55000
    - kind: grant_unlock
      name: federation_capital_license
    - kind: grant_unlock
      name: fed_carrier_license
    - kind: grant_unlock
      name: turret_license

# ══════════════════════════════════════════════════════════════════════════════
# THE EAST WIND — Rebel arc (the mirror of the espionage arc, from the other
# trench). Recruited on Titan, run relief into rebel Procyon, fire the first
# shots at the Federation, reach Deneb, then turn captured Federation tech to the
# Alliance. Grants the rebel hardware and a captured-Fed path: rebel_ship_license,
# rebel_capital_license, federation_ship_license. Gated behind pirate_bounty_sol.
# ══════════════════════════════════════════════════════════════════════════════

east_wind_1:
  faction: Rebel
  briefing: "A woman in a worn flight jacket slides into the seat across from you in the Titan bar. 'You fly like someone who's tired of being told where. There's a wind blowing in from the frontier, friend, and it's blowing east. If you want in, there's a cell leader waiting on Barnard Station. Codeword's the same as the wind. 3,000 to make the introduction.'"
  success_text: "The cell leader hears the codeword and relaxes a fraction. 'East wind. Good. We can use a pilot who isn't on anyone's payroll. Stay close — the work gets realer from here.'"
  failure_text: "The contact on Barnard waits, decides you aren't coming, and is gone."
  preconditions:
    - kind: completed
      mission: pirate_bounty_sol
  offer:
    kind: npc_offer
    planet: titan
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: meet_npc
    planet: barnard_station
    npc_name: "the cell leader"
    building: bar
  completion_effects:
    - kind: pay
      credits: 3000

east_wind_2:
  faction: Rebel
  briefing: "'Procyon's outer camps are out of medicine and the Federation cordon is 'inspecting' every relief ship into the ground,' the cell leader says. 'Run twelve units across the Drift to Procyon Prime. Don't stop for patrols. 18,000, and you'll have earned the next conversation.'"
  success_text: "The Procyon med-camp unloads the crates in the dark. A medic grips your arm. 'You don't know what this means.' The cell leader is waiting at Deneb's door."
  failure_text: "The relief run failed, and the Procyon camps went without."
  preconditions:
    - kind: completed
      mission: east_wind_1
  offer:
    kind: auto
  start_effects:
    - kind: load_cargo
      commodity: medical_supplies
      quantity: 12
      reserved: true
  objective:
    kind: land_on_planet
    planet: procyon_prime
  requires:
    - kind: has_cargo
      commodity: medical_supplies
      quantity: 12
  completion_effects:
    - kind: remove_cargo
      commodity: medical_supplies
      quantity: 12
    - kind: pay
      credits: 7000

east_wind_3:
  faction: Rebel
  briefing: "'A Federation patrol is herding a refugee convoy out of Procyon space — they'll strip it for 'contraband' and leave the families drifting,' the cell leader says, jaw tight. 'This is the line, pilot. Cross it and there's no going back to the Federation's good graces. Break that patrol. 22,000, and the Alliance opens its hangars to you.'"
  success_text: "The patrol scatters and the convoy slips free. You've fired on the Federation now — there's no unfiring it. The Alliance uploads rebel ship clearance to your hull: their fighters and gunboats are yours."
  failure_text: "The patrol drives the refugee convoy into custody, and the Alliance keeps its distance."
  preconditions:
    - kind: completed
      mission: east_wind_2
  offer:
    kind: auto
  objective:
    kind: destroy_ships
    system: procyon
    ship_type: fed_patrol
    count: 3
    target_name: "Federation Patrol"
    hostile: true
  completion_effects:
    - kind: pay
      credits: 8500
    - kind: grant_unlock
      name: rebel_ship_license

east_wind_4:
  faction: Rebel
  briefing: "'Before command trusts you with a capital berth, they need to see you take a hard target,' the cell leader says. 'The Federation moves javelin-missile schematics through a guarded depot run in Barnard — our engineers have wanted that missile tech for years. Break the escort, salvage the schematic-cores, and the Alliance arms you with javelins of your own. 11,000.'"
  success_text: "The escort burns and the schematic-cores are in your hold. The Alliance's armorers go to work, and within days your racks carry reverse-engineered javelin missiles. Command will see you at Deneb now — you've earned the capital conversation."
  failure_text: "The escort held and the javelin schematics jumped out of Barnard. The Alliance keeps its capital berths closed to you."
  preconditions:
    - kind: completed
      mission: east_wind_3
  offer:
    kind: auto
  objective:
    kind: destroy_ships
    system: barnard
    ship_type: fed_patrol
    count: 3
    target_name: "Federation Depot Escort"
    hostile: true
    collect:
      commodity: weapons_tech
      quantity: 3
  completion_effects:
    - kind: pay
      credits: 11000
    - kind: grant_unlock
      name: rebel_weapons_license

east_wind_5:
  faction: Rebel
  briefing: "At Deneb Prime the cell leader brings you before Alliance command. 'There's a hardliner faction here that wants to hit Kepler-22b — a civilian world — to 'send a message.' Some of us want it stopped. Meet our contact in the Deneb bar and decide which way the wind blows. 10,000 either way.'"
  success_text: "Whatever you chose at Deneb, the Alliance now counts you as one of its own — and grants you a capital berth. With the javelins you recovered already on the racks, the converted-hull frigates of the rebel fleet are yours to command."
  failure_text: "You leave Deneb without the Alliance's trust, and the capital berth with it."
  preconditions:
    - kind: completed
      mission: east_wind_4
  offer:
    kind: auto
  objective:
    kind: meet_npc
    planet: deneb_prime
    npc_name: "the Alliance contact"
    building: bar
  completion_effects:
    - kind: pay
      credits: 10000
    - kind: grant_unlock
      name: rebel_capital_license

east_wind_6:
  faction: Rebel
  briefing: "'The Federation builds its ships off ours, and it's time we returned the favor,' the cell leader says. 'A Federation supply element is moving schematics-cores through Kepler-22. Take them down and salvage the cores — our engineers will reverse them into a license we can actually use. 12,000.'"
  success_text: "The cores are aboard and the Alliance's engineers go to work. Within a week your hull carries a reverse-engineered Federation ship license — their own designs, flying under the east wind, with Federation proton beams and IR missiles to match."
  failure_text: "The schematics-cores jump out of Kepler-22 intact, and the chance is gone."
  preconditions:
    - kind: completed
      mission: east_wind_5
  offer:
    kind: auto
  objective:
    kind: destroy_ships
    system: kepler_22
    ship_type: fed_patrol
    count: 2
    target_name: "Federation Supply Element"
    hostile: true
    collect:
      commodity: weapons_tech
      quantity: 4
  completion_effects:
    - kind: pay
      credits: 12000
    - kind: grant_unlock
      name: federation_ship_license
    - kind: grant_unlock
      name: proton_beam_license
    - kind: grant_unlock
      name: federation_weapons_license

east_wind_7:
  faction: Rebel
  briefing: "The cell leader can barely contain it. 'We did it. Our engineers turned a captured Federation carrier hull into something that flies the east wind — but the Federation wants it back before it ever launches. A reclamation task force is inbound on the Deneb yards. Hold them off long enough for the carrier to go live, and command names you its first captain. 40,000. This is the whole war, pilot.'"
  success_text: "The Federation task force breaks against the Deneb yard guns — and the rebel carrier slips its moorings, alive at last. Command makes good: the rebel carrier and the turret tech that arms it are yours to command. 40,000 credits. The east wind has a capital fleet now, and you lead it."
  failure_text: "The task force reached the yards and the carrier burned at its moorings. The Alliance's one capital hope is ash."
  preconditions:
    - kind: completed
      mission: east_wind_6
  offer:
    kind: auto
  objective:
    kind: destroy_ships
    system: deneb
    ship_type: fed_destroyer
    count: 2
    target_name: "Federation Reclamation Force"
    hostile: true
  completion_effects:
    - kind: pay
      credits: 40000
    - kind: grant_unlock
      name: rebel_carrier_license
    - kind: grant_unlock
      name: turret_license

# ══════════════════════════════════════════════════════════════════════════════
# NO FLAG — Pirate arc (the freest, darkest road). A Pluto fixer, a Drift raid,
# an ambush on the very rebel convoy the espionage arc protects, service under
# the Pirate King forging a Free Fleet, and a last stand defending the haven
# against the Federation pacification fleet — the same battle Weight of Order
# lets you lead, from the other side. Grants carrier_license (the Free Fleet).
# Gated behind pirate_bounty_sol.
# ══════════════════════════════════════════════════════════════════════════════

no_flag_1:
  faction: Pirate
  briefing: "A fixer in the Pluto bar doesn't give a name. 'Got eight units of exotic matter that never officially existed, and a Federation sweep between here and Triton. Run it to my man on Triton without getting scanned and there's 5,000 in it. No flags, no records, no questions.'"
  success_text: "The Triton contact weighs the crates and grins. 'Clean run. The fixer was right about you.' Out here, a reputation for not getting caught is worth more than the cargo."
  failure_text: "The Federation sweep tags your hold, and the fixer writes you off as a liability."
  preconditions:
    - kind: completed
      mission: pirate_bounty_sol
  offer:
    kind: npc_offer
    planet: pluto
    weight: 1.0
    building: bar
    approach: seek
  start_effects:
    - kind: load_cargo
      commodity: exotic_matter
      quantity: 8
      reserved: true
  objective:
    kind: land_on_planet
    planet: triton
  requires:
    - kind: has_cargo
      commodity: exotic_matter
      quantity: 8
  completion_effects:
    - kind: remove_cargo
      commodity: exotic_matter
      quantity: 8
    - kind: pay
      credits: 5000

no_flag_2:
  faction: Pirate
  briefing: "The fixer has bigger work. 'A fat merchant convoy is cutting through the Drift thinking the borderland's empty. It isn't — it's ours. Hit the freighters, take what's in their holds, and we both eat well. 8,000 plus whatever you can carry off.'"
  success_text: "The freighters' holds come open like cracked safes. The fixer counts the exotic matter you bring back and nods. 'The King's going to want to meet you.'"
  failure_text: "The convoy's escorts drive you off, and the fixer keeps his distance."
  preconditions:
    - kind: completed
      mission: no_flag_1
  offer:
    kind: auto
  objective:
    kind: destroy_ships
    system: drift
    ship_type: freighter
    count: 2
    target_name: "Merchant Convoy"
    hostile: true
    collect:
      commodity: exotic_matter
      quantity: 4
  completion_effects:
    - kind: pay
      credits: 8000

no_flag_3:
  faction: Pirate
  briefing: "'Rebels are running a weapons convoy through the Drift — the same shipments Federation intelligence bleeds itself protecting,' the fixer says. 'Neither side owns us. Take the convoy, strip the weapons parts, and let the Federation and the Alliance both wonder where their war went. 9,500.'"
  success_text: "The rebel gunboats burn and their cargo is yours. You've now robbed both halves of the war in a single month. The fixer laughs. 'No flag, no master. The King will see you at the haven.'"
  failure_text: "The rebel escorts hold the convoy together and you limp away empty-handed."
  preconditions:
    - kind: completed
      mission: no_flag_2
  offer:
    kind: auto
  objective:
    kind: destroy_ships
    system: drift
    ship_type: rebel_gunboat
    count: 3
    target_name: "Rebel Weapons Convoy"
    hostile: true
    collect:
      commodity: weapons_parts
      quantity: 4
  completion_effects:
    - kind: pay
      credits: 9500

no_flag_4:
  faction: Pirate
  briefing: "The fixer sends coordinates to the haven at Kuiper. 'The King wants to look you in the eye. He's building something out here — a Free Fleet, ships that answer to no nation. Meet him in the haven bar. Don't be late, and don't be armed when you walk in.'"
  success_text: "The Pirate King is older than the legends and twice as sharp. 'A free Drift, captain — no tariffs, no conscription, no flag. I need pilots who understand that.' He marks you as one of his own. 'There's one more fight, and it's the only one that matters.'"
  failure_text: "You miss the meeting, and the King's invitation does not come twice."
  preconditions:
    - kind: completed
      mission: no_flag_3
  offer:
    kind: auto
  objective:
    kind: meet_npc
    planet: kuiper_haven
    npc_name: "the Pirate King"
    npc: pirate_king
    building: bar
  completion_effects:
    - kind: pay
      credits: 11000

no_flag_5:
  faction: Pirate
  briefing: "The King's voice is flat over the comm. 'The Federation pacification fleet has come for the haven — the same fleet that thinks it's bringing order. Out here we call it what it is: an eviction. Hold the line over Kuiper. Break their patrols and the Free Fleet is born. 40,000 credits, captain, and a carrier of your own.'"
  success_text: "The last Federation patrol breaks and runs, and the haven still flies no flag. The King grips your shoulder. 'The Free Fleet is real now, and you helped make it. Take a carrier — you've earned the deck.' Your carrier certification comes through."
  failure_text: "The pacification fleet takes the haven, and the Free Fleet dies before it was ever born."
  preconditions:
    - kind: completed
      mission: no_flag_4
  offer:
    kind: auto
  objective:
    kind: destroy_ships
    system: kuiper_reach
    ship_type: fed_patrol
    count: 4
    target_name: "Pacification Patrol"
    hostile: true
  completion_effects:
    - kind: pay
      credits: 40000
    - kind: grant_unlock
      name: carrier_license
    - kind: grant_unlock
      name: turret_license

# ══════════════════════════════════════════════════════════════════════════════
# THE INVISIBLE HAND — Merchant Guild arc (private work after the merchant
# ladder). Corner a market, arm both sides, break a rival cartel, defend Guild
# independence, and take a seat on the board. The Guild wins quietly no matter
# who else does. Caps with carrier_license (the board's surplus carrier).
# Gated behind merchant_story_3.
# ══════════════════════════════════════════════════════════════════════════════

invisible_hand_1:
  faction: Merchant
  briefing: "A Guild broker buys you a drink you didn't order. 'You've run the ladder. Now the real work. We've fronted you twelve units of Mars medical supply — every unit off the market is a unit the price climbs. Sit on it, then sell it back to us on Earth at the new rate. 9,000 on delivery. The shortage is the product.'"
  success_text: "Earth pays the inflated rate without blinking, and the broker toasts you. 'Scarcity is just inventory you haven't sold yet. You have the instinct.'"
  failure_text: "The stock never reaches Earth, and the broker quietly closes your line of credit."
  preconditions:
    - kind: completed
      mission: merchant_story_3
  offer:
    kind: npc_offer
    planet: mars
    weight: 1.0
    building: market
    approach: seek
  start_effects:
    - kind: load_cargo
      commodity: medical_supplies
      quantity: 12
      reserved: true
  objective:
    kind: land_on_planet
    planet: earth
  requires:
    - kind: has_cargo
      commodity: medical_supplies
      quantity: 12
  completion_effects:
    - kind: remove_cargo
      commodity: medical_supplies
      quantity: 12
    - kind: pay
      credits: 9000

invisible_hand_2:
  faction: Merchant
  briefing: "'War is the Guild's best customer, and a managed war buys forever,' the broker says. 'We're selling weapons parts to the Federation at Barnard and the Alliance at Procyon — both, deliberately. Run this consignment to Procyon Prime. Don't develop a conscience about it; the cargo doesn't. 8,500.'"
  success_text: "Procyon's quartermaster signs for the parts that will be shot back at Barnard's parts next season. The broker is pleased. 'Balance, you see. We don't pick sides. We supply them.'"
  failure_text: "The consignment doesn't reach Procyon, and the Guild's careful balance tips."
  preconditions:
    - kind: completed
      mission: invisible_hand_1
  offer:
    kind: auto
  start_effects:
    - kind: load_cargo
      commodity: weapons_parts
      quantity: 10
      reserved: true
  objective:
    kind: land_on_planet
    planet: procyon_prime
  requires:
    - kind: has_cargo
      commodity: weapons_parts
      quantity: 10
  completion_effects:
    - kind: remove_cargo
      commodity: weapons_parts
      quantity: 10
    - kind: pay
      credits: 8500

invisible_hand_3:
  faction: Merchant
  briefing: "'A rival cartel is undercutting us out of the Drift, and the board would like them to stop,' the broker says lightly. 'We don't soil our hands with this sort of thing — which is why we contract it to you. Their convoy runs the Drift unescorted. Break it. 26,000, and you were never here.'"
  success_text: "The rival cartel's convoy scatters across the Drift and their prices climb back into line with ours. The broker never mentions it again, which is how you know it mattered."
  failure_text: "The rival convoy gets through, and the cartel keeps bleeding the Guild's margins."
  preconditions:
    - kind: completed
      mission: invisible_hand_2
  offer:
    kind: auto
  objective:
    kind: destroy_ships
    system: drift
    ship_type: cargo_transport
    count: 3
    target_name: "Rival Cartel Convoy"
    hostile: true
  completion_effects:
    - kind: pay
      credits: 10000

invisible_hand_4:
  faction: Merchant
  briefing: "The broker is, for once, not smiling. 'The Alliance is moving to seize a Guild depot at Barnard — nationalize our stock 'for the cause.' If they take it, the Federation will take the next one. Independence is the whole product, pilot. Defend the depot. 12,000.'"
  success_text: "The Alliance raiders pull back from Barnard and the depot stays Guild property. The broker exhales. 'Neither flag owns us. That is the only principle we have, and it is worth defending.'"
  failure_text: "The depot falls, and every faction takes note of how little it cost them."
  preconditions:
    - kind: completed
      mission: invisible_hand_3
  offer:
    kind: auto
  objective:
    kind: destroy_ships
    system: barnard
    ship_type: rebel_gunboat
    count: 2
    target_name: "Alliance Requisition Force"
    hostile: true
  completion_effects:
    - kind: pay
      credits: 12000

invisible_hand_5:
  faction: Merchant
  briefing: "The broker brings you to the Guild board floor on Earth. 'They've watched you corner a market, balance a war, and defend our independence without ever once asking whose side you were on. That's a board seat, pilot. Come take it. Wealth, a surplus carrier, and a hand on the prices that move worlds.'"
  success_text: "You take the seat and the carrier certification that comes with it. The broker leans in. 'Welcome to the only faction that wins every war. We didn't fire a shot — we just sent the invoice.' The surplus carrier yards are open to you."
  failure_text: "You leave the board floor without a seat, and the Guild's quiet door closes."
  preconditions:
    - kind: completed
      mission: invisible_hand_4
  offer:
    kind: auto
  objective:
    kind: meet_npc
    planet: earth
    npc_name: "the Guild board"
    building: market
  completion_effects:
    - kind: pay
      credits: 35000
    - kind: grant_unlock
      name: carrier_license
    - kind: grant_unlock
      name: turret_license

# ── Reclamation arc ──────────────────────────────────────────────────────
# After the Sleeper falls, Precursor remnants scatter into inhabited space.
# The coalition sweeps them system by system — and every system cleared
# tips the balance of control toward whoever holds the line there.
reclamation_1:
  faction: Precursor
  briefing: "Envoy Chandra finds you before you find her. 'The Sleeper is dead, but its brood scattered when it fell. Seekers have gone to ground in the Verge, striking at Frontier convoys from the drift ice. The Reaches held the line for us once — now we hold it for them. Take a coalition wing and burn the embers out.'"
  success_text: "The last seeker comes apart against the ice field. The Verge convoys fly unescorted within the week — and the Free Frontier's flag flies higher over the Reaches for it. 40,000 credits, wired with the coalition's thanks."
  failure_text: "The seekers melt back into the drift ice. The convoys keep dying, and the Verge remembers who left."
  preconditions:
    - kind: completed
      mission: rift_final
  offer:
    kind: npc_offer
    planet: threshold_watch
    weight: 1.0
    building: bar
    npc: rift_envoy
  objective:
    kind: destroy_ships
    system: the_verge
    ship_type: precursor_seeker
    count: 3
    target_name: Brood Seekers
    hostile: true
  completion_effects:
    - kind: pay
      credits: 40000
    - kind: shift_influence
      system: the_verge
      faction: FreeFrontier
      delta: 0.1
  squadron: [fed_patrol, frontier_skiff]

reclamation_2:
  faction: Precursor
  briefing: "Chandra's tactical display is a mess of red. 'Two sentinels nested in the Foundry slag fields — they're stripping Helios extractors for raw metal, rebuilding something in the dark. Helios is paying the coalition to make it stop, and the coalition is sending you. An enforcer and a Federation patrol will fly at your wing.'"
  success_text: "The second sentinel folds into the slag it was feeding on. Helios reopens the extractors within the day, and the Combine's stock in the Foundry climbs with them. 55,000 credits — plus a quiet bonus from a grateful Combine."
  failure_text: "The sentinels finish whatever they were building. Helios pulls out of the Foundry, and the coalition's phone stops ringing."
  preconditions:
    - kind: completed
      mission: reclamation_1
  offer:
    kind: npc_offer
    planet: threshold_watch
    weight: 1.0
    building: bar
    npc: rift_envoy
  objective:
    kind: destroy_ships
    system: the_foundry
    ship_type: precursor_sentinel
    count: 2
    target_name: Foundry Sentinels
    hostile: true
  completion_effects:
    - kind: pay
      credits: 55000
    - kind: shift_influence
      system: the_foundry
      faction: Helios
      delta: 0.1
    - kind: adjust_standing
      faction: Helios
      delta: 5.0
  squadron: [helios_enforcer, fed_patrol]

reclamation_3:
  faction: Precursor
  briefing: "Chandra doesn't sit. 'The last of the brood — two gleaners, the harvest-forms — jumped for Alpha Centauri. Core space, Captain. Sol's doorstep. If they root there, everything we bled for in the Rift was a delay, not a victory. The coalition is emptying its docks: a destroyer, a censer, and the Kuiper monitor jump with you. End the harvest. End all of it.'"
  success_text: "The second gleaner cracks open above Alpha Centauri and the sky is finally, completely quiet. The Federation plants its flag over the recovered wrecks, the Order sings the Silence full again, and the Reaches drink to the pilot who finished it. 90,000 credits, and three grateful powers."
  failure_text: "A gleaner slips the net and vanishes toward the core. Somewhere in the dark, the harvest begins again."
  preconditions:
    - kind: completed
      mission: reclamation_2
  offer:
    kind: npc_offer
    planet: threshold_watch
    weight: 1.0
    building: bar
    npc: rift_envoy
  objective:
    kind: destroy_ships
    system: alpha_centauri
    ship_type: precursor_gleaner
    count: 2
    target_name: Brood Gleaners
    hostile: true
  completion_effects:
    - kind: pay
      credits: 90000
    - kind: shift_influence
      system: alpha_centauri
      faction: Federation
      delta: 0.15
    - kind: adjust_standing
      faction: Federation
      delta: 5.0
    - kind: adjust_standing
      faction: Order
      delta: 5.0
    - kind: adjust_standing
      faction: FreeFrontier
      delta: 5.0
  squadron: [fed_destroyer, order_censer, frontier_monitor]
