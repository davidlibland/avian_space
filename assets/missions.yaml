deliver_wheat_intro:
  briefing: "A dockworker sprints toward you from the market stalls, out of breath. 'Thank god — a pilot. Mars colony is starving. 10 units of food need to get there yesterday. You take it, we pay on delivery. Please.'"
  success_text: "The governor claps you on the shoulder. The grain is already being unloaded."
  failure_text: "Word travels fast. Mars will be looking for a different pilot next time."
  preconditions: []
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: market
    approach: seek
  start_effects:
    - kind: load_cargo
      commodity: food
      quantity: 10
      reserved: true
  objective:
    kind: land_on_planet
    planet: mars
  requires:
    - kind: has_cargo
      commodity: food
      quantity: 10
  completion_effects:
    - kind: remove_cargo
      commodity: food
      quantity: 10
    - kind: pay
      credits: 1500

scavenge_iron:
  briefing: "A grizzled prospector leans against the mechanic shop wall, chewing something. 'Need 5 units of iron — clean stuff, pulled from the asteroid fields in Sol. No market-bought slag. Bring it back to Earth and I'll make it worth your time.'"
  success_text: "You've got the ore. Head back to Earth to collect your pay."
  failure_text: "Deal's off."
  preconditions:
    - kind: completed
      mission: deliver_wheat_intro
  offer:
    kind: npc_offer
    planet: mars
    weight: 0.5
    building: mechanicshop
  objective:
    kind: collect_pickups
    commodity: iron
    system: sol
    quantity: 5

scavenge_iron_deliver:
  briefing: "Deliver the iron to the prospector on Earth."
  success_text: "The prospector weighs the ore in one hand and nods. 'That's the real thing.'"
  failure_text: "The prospector is long gone by the time you check back in."
  preconditions:
    - kind: completed
      mission: scavenge_iron
  offer:
    kind: auto
  objective:
    kind: land_on_planet
    planet: earth
  requires:
    - kind: has_cargo
      commodity: iron
      quantity: 5
  completion_effects:
    - kind: remove_cargo
      commodity: iron
      quantity: 5
    - kind: pay
      credits: 2500

# ── Mining Guild storyline ─────────────────────────────────────────────────
# Three escalating collect-iron missions that introduce the player to
# asteroid mining across the Federation core and border systems. The final
# stage grants the mining license (unlocks the asteroid_miner in shipyards)
# plus an ongoing mining-template unlock so paid mining contracts keep
# showing up on mission boards.

mining_story_1:
  briefing: "A weather-beaten Mining Guild recruiter loiters near the shipyard, eyeing incoming pilots. She waves you over. 'Kid, we're short on haulers. Shoot up some asteroids around Sol and bring back 4 units of clean iron — no market-bought slag. 4,000 credits. Find me at the Mars market when you're done.'"
  success_text: "The recruiter looks impressed. 'Go see the foreman on Mars — she's got bigger work.'"
  failure_text: "The recruiter snorts. 'Don't waste my time again.'"
  preconditions: []
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: shipyard
  objective:
    kind: collect_pickups
    commodity: iron
    system: sol
    quantity: 4
  completion_effects:
    - kind: pay
      credits: 4000

mining_story_2:
  briefing: "The foreman is checking cargo manifests outside the Mars market. She pushes a datapad across a crate toward you. '6 units of iron, pulled from the Tau Ceti belt. Federation space, but further out — you'll need to jump. 8,000 on delivery. Come see our frontier contact at Barnard Rock when you make it back.'"
  success_text: "The foreman nods. 'Frontier work pays the best. Barnard Rock — ask for the Guild near the market.'"
  failure_text: "The foreman just shakes her head."
  preconditions:
    - kind: completed
      mission: mining_story_1
  offer:
    kind: npc_offer
    planet: mars
    weight: 1.0
    building: market
  objective:
    kind: collect_pickups
    commodity: iron
    system: tau_ceti
    quantity: 6
  completion_effects:
    - kind: pay
      credits: 8000

mining_story_3:
  briefing: "A wiry Guild agent waits outside the Barnard Rock market, arms folded. 'Border work. 8 units of clean iron, pulled from the Barnard belt. Rebels and pirates both sweep through here, so keep your eyes open. 18,000 credits — and if you make it back, you'll have earned your Miner's Guild certification. Real mining contracts will start showing up after that.'"
  success_text: "The agent slides a signed certification across the counter: 'You're Guild now. Check any mission board for mining contracts.' Your ship computer registers the new licenses."
  failure_text: "The agent sighs. 'The border eats the unprepared.'"
  preconditions:
    - kind: completed
      mission: mining_story_2
  offer:
    kind: npc_offer
    planet: barnard_rock
    weight: 1.0
    building: market
  objective:
    kind: collect_pickups
    commodity: iron
    system: barnard
    quantity: 8
  completion_effects:
    - kind: pay
      credits: 18000
    - kind: grant_unlock
      name: mining_license
    - kind: grant_unlock
      name: mining_templates_unlocked

# ── Merchant Guild storyline ───────────────────────────────────────────────
# Three escalating delivery missions that introduce the player to the
# Merchant Guild's three cargo-ship tiers. Each stage pays roughly the
# price of the next ship up and grants its license, creating a natural
# upgrade path: shuttle → freighter → hauler → bulk_carrier.

merchant_story_1:
  briefing: "A Merchant Guild rep is haggling with a vendor near the market. He spots you and breaks away. 'You look like you need work. Short run — 8 units of food to Moon colony. Good shakedown for a new pilot. 45,000 on delivery, and we'll get you certified for a real cargo ship. Come find me at Moon's market when it's done.'"
  success_text: "The rep on Moon hands over the credits and a certification chit. 'Freighter license. Spend wisely. Come find me at the market for the next run.'"
  failure_text: "The rep shrugs. 'The Guild's got other pilots.'"
  preconditions: []
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: market
  start_effects:
    - kind: load_cargo
      commodity: food
      quantity: 8
      reserved: true
  objective:
    kind: land_on_planet
    planet: moon
  requires:
    - kind: has_cargo
      commodity: food
      quantity: 8
  completion_effects:
    - kind: remove_cargo
      commodity: food
      quantity: 8
    - kind: pay
      credits: 45000
    - kind: grant_unlock
      name: merchant_freighter_license

merchant_story_2:
  briefing: "The Guild rep is leaning against a stack of crates outside the Moon market. He waves you over with a manifest. 'Bigger run this time — 50 units of food out to tau_ceti_2, one jump from Sol. You'll want a freighter for this one. 50,000 on delivery. When it's done, head to the tau_ceti_2 market — the Guild's regional office is there.'"
  success_text: "The regional manager signs off the shipment and hands you a hauler license: 'Good run. We've got one more contract for you. Come back when you're ready.'"
  failure_text: "The regional manager's disappointment is palpable."
  preconditions:
    - kind: completed
      mission: merchant_story_1
  offer:
    kind: npc_offer
    planet: moon
    weight: 1.0
    building: market
  start_effects:
    - kind: load_cargo
      commodity: food
      quantity: 50
      reserved: true
  objective:
    kind: land_on_planet
    planet: tau_ceti_2
  requires:
    - kind: has_cargo
      commodity: food
      quantity: 50
  completion_effects:
    - kind: remove_cargo
      commodity: food
      quantity: 50
    - kind: pay
      credits: 50000
    - kind: grant_unlock
      name: merchant_hauler_license

merchant_story_3:
  briefing: "The regional manager is reviewing shipments outside the tau_ceti_2 market. She unrolls a long-haul contract. '75 units of food to kepler_22b, deep in Federation space. Long jumps. You'll need a hauler for this — anything smaller and the cargo won't fit. 85,000 credits, and we'll certify you for the biggest ships the Guild sells.'"
  success_text: "The kepler_22b quartermaster confirms receipt. 'You're one of ours now. Bulk carrier license is yours — if you can afford one.'"
  failure_text: "The contract is voided."
  preconditions:
    - kind: completed
      mission: merchant_story_2
  offer:
    kind: npc_offer
    planet: tau_ceti_2
    weight: 1.0
    building: market
  start_effects:
    - kind: load_cargo
      commodity: food
      quantity: 75
      reserved: true
  objective:
    kind: land_on_planet
    planet: kepler_22b
  requires:
    - kind: has_cargo
      commodity: food
      quantity: 75
  completion_effects:
    - kind: remove_cargo
      commodity: food
      quantity: 75
    - kind: pay
      credits: 85000
    - kind: grant_unlock
      name: merchant_bulk_license

# ── Bounty: Sol pirate ─────────────────────────────────────────────────────

pirate_bounty_sol:
  briefing: "A Federation officer jogs over from the shipyard, waving you down. 'Pilot — we need you. There's a pirate corvette tearing through merchant convoys in Sol. Weak ship, but they've hit three transports this week alone. Destroy them — 25,000 credits, enough to pick up a fighter if that's your thing.'"
  success_text: "As the corvette breaks apart, your sensors pick up a faint thruster signature — an escape pod, accelerating hard toward the outer system. The officer's voice crackles over comms: 'Don't let them disappear. Our intel says the pod is heading for Triton. Land there and apprehend the pirate before they find a new ship.'"
  failure_text: "The officer shakes her head. 'They got away. Maybe next time.'"
  preconditions: []
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: shipyard
    approach: seek
  objective:
    kind: destroy_ships
    system: sol
    ship_type: pirate_corvette
    count: 1
    target_name: Notorious Pirate
    hostile: true
  completion_effects:
    - kind: pay
      credits: 25000

pirate_escape_pod:
  briefing: "Land on Triton (in sol) and apprehend the pirate before they find a new ship."
  success_text: "You corner the pirate in a frozen alley on Triton. They raise their hands. 'Alright, alright. You got me.' The Federation transfers 15,000 credits and a fighter certification to your account — the debrief confirmed this pirate had been scouting Federation convoys for months."
  failure_text: "The pirate slipped away in the ice fields. They'll be someone else's problem now."
  preconditions:
    - kind: completed
      mission: pirate_bounty_sol
  offer:
    kind: auto
  start_effects: []
  objective:
    kind: catch_npc
    planet: triton
    npc_name: "the escaped pirate"
    building: bar
  completion_effects:
    - kind: pay
      credits: 15000
    - kind: grant_unlock
      name: fighter_license

# ── Bounty Hunter storyline ────────────────────────────────────────────────
# Escalating combat missions that unlock the corvette, frigate, and IR
# missiles. Starts at Earth shipyard (Sol), moves outward through
# progressively dangerous systems. Completing the full arc grants
# bounty_hunter_license which unlocks ongoing random bounty templates on
# mission boards.

# Phase 1: Corvette path (2 missions, pays ~18k each → corvette costs 18k)

bounty_story_1:
  briefing: "The Federation officer from last time intercepts you near the Earth shipyard. 'Nice work with that pirate. We've got reports of two more pirate corvettes raiding convoys near Alpha Centauri. Dangerous space — no planets, thick asteroid fields. Take them out — 18,000 credits. Come find me here when it's done.'"
  success_text: "The officer nods. 'Alpha Centauri is a little safer tonight. 18,000 credits. Come back — we've got one more job before we can certify you for a real combat ship.'"
  failure_text: "The officer grimaces. 'Those pirates are still out there.'"
  preconditions:
    - kind: completed
      mission: pirate_bounty_sol
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: shipyard
    approach: seek
  objective:
    kind: destroy_ships
    system: alpha_centauri
    ship_type: pirate_corvette
    count: 2
    target_name: Pirate Raiders
    hostile: true
  completion_effects:
    - kind: pay
      credits: 18000

bounty_story_2:
  briefing: "The officer catches you outside the shipyard, datapad in hand. 'A pirate missile boat has been ambushing freighters in the Drift. Heavy hitter — mines and missiles both. Destroy it and we can start your path to corvette-class certification. 20,000 credits on top.'"
  success_text: "As the missile boat cracks open, an encrypted distress call spikes across the comms — a senior pirate captain, coordinating raids from the ground. The Federation officer comes on: 'That voice. We know him. He's gone to ground on Titan. Run him down before he regroups.'"
  failure_text: "The officer shakes her head. 'That missile boat is still out there.'"
  preconditions:
    - kind: completed
      mission: bounty_story_1
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: shipyard
    approach: seek
  objective:
    kind: destroy_ships
    system: drift
    ship_type: pirate_missile_boat
    count: 1
    target_name: Pirate Missile Boat
    hostile: true
  completion_effects:
    - kind: pay
      credits: 20000

bounty_story_2_catch:
  briefing: "The pirate captain is hiding in Titan's smog-choked dockside quarter. Find him before he slips offworld — our intel says he's trying to buy passage out of a bar."
  success_text: "You pin the captain against a bulkhead in a back-alley bar. He spits, but surrenders. The Federation uploads the corvette certification and proton-beam clearance to your ship the moment he's in custody. 15,000 credits too. Vasquez at Barnard Station has the next tier whenever you're ready."
  failure_text: "The captain vanished into Titan's underlayer. He'll be running a new crew within a month."
  preconditions:
    - kind: completed
      mission: bounty_story_2
  offer:
    kind: auto
  objective:
    kind: catch_npc
    planet: titan
    npc_name: "the pirate captain"
    building: bar
  completion_effects:
    - kind: pay
      credits: 15000
    - kind: grant_unlock
      name: corvette_license
    - kind: grant_unlock
      name: proton_beam_license

# Phase 2: Frigate path (2 missions, pays ~60k each → frigate costs 120k)

bounty_story_3:
  briefing: "Captain Vasquez is inspecting a damaged hull outside the Barnard Station mechanic shop. She sizes you up. 'You've got a reputation now. We've tracked a pirate strike group — two missile boats — operating out of the Drift. Border space, no backup. 55,000 credits if you eliminate them both. Report back here when it's done.'"
  success_text: "Vasquez stamps your record. 'Impressive. One more target and you'll have earned a frigate certification — and access to Federation IR missiles. Come find me at the mechanic shop.'"
  failure_text: "Vasquez says nothing. The dossier stays on the table."
  preconditions:
    - kind: completed
      mission: bounty_story_2_catch
  offer:
    kind: npc_offer
    planet: barnard_station
    weight: 1.0
    building: mechanicshop
    approach: seek
  objective:
    kind: destroy_ships
    system: drift
    ship_type: pirate_missile_boat
    count: 2
    target_name: Pirate Strike Group
    hostile: true
  completion_effects:
    - kind: pay
      credits: 55000

bounty_story_4:
  briefing: "Vasquez strides over from the mechanic shop, urgency in her step. 'This is the big one. Three pirate missile boats have set up a forward base in Alpha Centauri — dug in among the asteroid fields. Take all three out and we can move you up to frigate-class. 65,000 credits. And after this, the bounty board will keep you busy. Good hunting.'"
  success_text: "Vasquez reviews the combat data. 'Clean work. But — one of the boats launched a lifeboat just before it broke up. Our tracker says it burned for Barnard Rock. That's the pirate ring's commander. Get to him before local sympathizers hide him away.'"
  failure_text: "Vasquez stares at the tactical display. 'They're still operational.'"
  preconditions:
    - kind: completed
      mission: bounty_story_3
  offer:
    kind: npc_offer
    planet: barnard_station
    weight: 1.0
    building: shipyard
    approach: seek
  objective:
    kind: destroy_ships
    system: alpha_centauri
    ship_type: pirate_missile_boat
    count: 3
    target_name: Pirate Forward Base
    hostile: true
  completion_effects:
    - kind: pay
      credits: 65000

bounty_story_4_catch:
  briefing: "The pirate commander fled to Barnard Rock. Our informants say he's bribing a mechanic to swap transponders on a hauler. Find him at the mechanic shop before he lifts off under a new name."
  success_text: "You catch the commander crouched behind a coolant rig, half-disguised in mechanic's coveralls. He laughs bitterly: 'You got me.' The Federation's response is immediate — frigate certification, Federation IR missile clearance, and full bounty-hunter accreditation all land on your file. 25,000 credits on top. 'Commander, you're one of ours now,' Vasquez says. 'The bounty board has a standing contract for you — check it any time.'"
  failure_text: "The commander's transponder vanished from our scopes an hour later. He's already on another ship, halfway to the Drift."
  preconditions:
    - kind: completed
      mission: bounty_story_4
  offer:
    kind: auto
  objective:
    kind: catch_npc
    planet: barnard_rock
    npc_name: "the pirate commander"
    building: mechanicshop
  completion_effects:
    - kind: pay
      credits: 25000
    - kind: grant_unlock
      name: frigate_license
    - kind: grant_unlock
      name: federation_weapons_license
    - kind: grant_unlock
      name: bounty_hunter_license

# Phase 3: Carrier tier (2 missions — pirate carriers in border systems)
# These are endgame-difficulty missions targeting the heavily armed pirate
# carrier ships. Completing the arc grants carrier_license.

bounty_story_5:
  briefing: "Vasquez is pacing outside the Barnard Station mechanic shop when she spots you. 'Commander — intel just came in. A pirate carrier has set up shop in the Drift. A carrier — it launches corvettes from a flight deck. Take out the carrier itself and the escorts scatter. 90,000 credits. Be careful — those corvettes will be on you the moment you engage.'"
  success_text: "Vasquez lets out a low whistle. 'You took down a carrier. That's not something many pilots can claim. 90,000 credits — and come back when you're ready for the last one.'"
  failure_text: "Vasquez stares at the tactical display. 'That carrier is still launching raids.'"
  preconditions:
    - kind: completed
      mission: bounty_story_4_catch
  offer:
    kind: npc_offer
    planet: barnard_station
    weight: 1.0
    building: mechanicshop
    approach: seek
  objective:
    kind: destroy_ships
    system: drift
    ship_type: pirate_carrier
    count: 1
    target_name: Pirate Carrier
    hostile: true
  completion_effects:
    - kind: pay
      credits: 90000

bounty_story_6:
  briefing: "Vasquez intercepts you near the shipyard, arms folded. 'This is the endgame, Commander. Two pirate carriers operating out of Alpha Centauri — they've been coordinating raids across the border for months. Eliminate both and we can start the paperwork for your carrier-class certification. 120,000 credits. This is the hardest contract we've ever posted. Good hunting.'"
  success_text: "Both carriers are wreckage. But sensors picked up a heavily shielded shuttle peeling off the flagship at the last moment — running silent for Pluto, deep in Sol's outer dark. 'That's the Pirate King,' Vasquez says quietly. 'The man who's been running all of this. Get him and it's over.'"
  failure_text: "Vasquez says quietly, 'They're still out there. The border won't hold much longer.'"
  preconditions:
    - kind: completed
      mission: bounty_story_5
  offer:
    kind: npc_offer
    planet: barnard_station
    weight: 1.0
    building: shipyard
    approach: seek
  objective:
    kind: destroy_ships
    system: alpha_centauri
    ship_type: pirate_carrier
    count: 2
    target_name: Pirate Carrier Group
    hostile: true
  completion_effects:
    - kind: pay
      credits: 120000

bounty_story_6_catch:
  briefing: "Track the Pirate King to Pluto. He'll be in the bar quarter — that's where every fugitive in Sol goes when they've got nowhere else. End this."
  success_text: "The Pirate King is drinking alone in a frost-rimed bar under Pluto's thin dome. He doesn't even reach for a weapon — just raises his glass. 'Took you long enough, Commander.' Vasquez comes over comms as he's cuffed: 'The border is secure for the first time in years. Carrier certification and turret clearance are yours — the full package. 50,000 credits on top. Every Federation officer in the fleet owes you a drink. The bounty board will keep posting carrier-class contracts if you're hungry for more.'"
  failure_text: "The Pirate King disappeared into Pluto's ice fields. He'll be rebuilding by next year."
  preconditions:
    - kind: completed
      mission: bounty_story_6
  offer:
    kind: auto
  objective:
    kind: catch_npc
    planet: pluto
    npc_name: "the Pirate King"
    building: bar
  completion_effects:
    - kind: pay
      credits: 50000
    - kind: grant_unlock
      name: carrier_license
    - kind: grant_unlock
      name: turret_license

# ── Espionage storyline ────────────────────────────────────────────────────
# A 15-mission arc offered by Federation Intelligence operating out of the
# Earth bar. Starts by hunting rebel spies who have infiltrated Federation
# worlds, escalates to intercepting rebel weapons-tech smugglers, then
# plunges the player into Rebel space for deep-cover meets with double
# agents and defectors. The final missions steal the schematics for the
# entire rebel fighter program. Completing the arc grants
# `rebel_weapons_license` (javelin missiles) and `rebel_ship_license`
# (rebel fighter + gunboat) — reverse-engineered from the stolen tech.
#
# Contains four combat missions, each with a `collect` requirement on the
# `weapons_tech` commodity, and six NPC objectives (3 catch_npc on
# Federation worlds, 3 meet_npc on Rebel worlds).

# Phase 1: Catch rebel infiltrators on Federation planets.

espionage_1:
  briefing: "A Federation Intelligence officer nurses a drink at the back of the Earth bar. She doesn't look up until you're seated. 'You clean? Good. A Sirius Cell operative has been lifting naval dispatches out of our Earth comm-center. He made our tail yesterday and he's gone to ground on the surface. Run him down before extraction — 8,000 credits. We don't exist, and neither does this conversation.'"
  success_text: "You corner the operative behind the market loading bays. He has a burst-transmitter in his hand — you get to it first. The officer's voice, three hours later: 'Clean work. Credits are in your account. Come back when you're ready for the next one.'"
  failure_text: "The operative made his extraction window. Whatever he had is already on a rebel data-lance halfway to Sirius."
  preconditions: []
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: bar
    approach: wait
  objective:
    kind: catch_npc
    planet: earth
    npc_name: "the Sirius Cell operative"
    building: market
  completion_effects:
    - kind: pay
      credits: 8000

espionage_2:
  briefing: "The officer is back in the same booth, no small talk. 'Their next cell is on Mars — a mining-data courier, looks like he's trying to slip belt-survey records out to a freighter due in two days. He hangs around the Mars market. 12,000 credits if you pick him up before that freighter clears customs.'"
  success_text: "The courier tries to run when he spots you — straight into a dead-end alley behind the market. He drops a data-sliver that Federation techs will spend a month decoding. 12,000 credits hits your account."
  failure_text: "The freighter lifted on schedule. Mars mining data is on its way to rebel shipyards."
  preconditions:
    - kind: completed
      mission: espionage_1
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: catch_npc
    planet: mars
    npc_name: "the rebel courier"
    building: market
  completion_effects:
    - kind: pay
      credits: 12000

espionage_3:
  briefing: "The officer slides a folder across the table — a dossier thick with photos. 'This one's their handler. He recruits couriers across half the Federation, and right now he's on Kepler-22b pretending to be a shipyard inspector. He's the prize, Commander. Get him and we crack the whole network. 22,000 credits.'"
  success_text: "You catch the handler at the shipyard, flanked by two fake aides. He doesn't even struggle — just sighs like a tired professor. 'Always the new faces,' he mutters. Federation Intelligence descends on his safe-house within the hour. Your account ticks up by 22,000 credits. 'Commander,' the officer says, 'you've earned a seat at the real table. The next briefing will be different.'"
  failure_text: "The handler slipped offworld. Every lead we had just went cold."
  preconditions:
    - kind: completed
      mission: espionage_2
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: catch_npc
    planet: kepler_22b
    npc_name: "the rebel handler"
    building: shipyard
  completion_effects:
    - kind: pay
      credits: 22000

# Phase 2: Intercept rebel weapons-tech smugglers (combat + delivery).

espionage_4:
  briefing: "'Here's the real work, Commander.' The officer pulls up a tactical display. 'The handler gave us a shipping schedule. Three rebel fighters are running stolen Federation weapons-tech through Alpha Centauri inside the next 48 hours. Destroy all three and salvage the cargo pods — we want the tech back. 30,000 credits.'"
  success_text: "Three rebel fighters, reduced to drifting wreckage. The cargo pods are intact — four units of weapons-tech, ours again. Head to Kepler-22b for the drop."
  failure_text: "The convoy made rebel space. That tech is already being reverse-engineered in Sirius."
  preconditions:
    - kind: completed
      mission: espionage_3
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: destroy_ships
    system: alpha_centauri
    ship_type: fighter
    count: 3
    target_name: Rebel Smuggling Wing
    hostile: true
    collect:
      commodity: weapons_tech
      quantity: 4
  completion_effects:
    - kind: pay
      credits: 30000

espionage_4_deliver:
  briefing: "Run the recovered weapons-tech to Kepler-22b for technical analysis. Kepler's labs will strip it and tell us what the rebels have."
  success_text: "The Kepler-22b technician signs for the shipment: 'This buys us six months.' 15,000 credits hit your account. The officer wants to see you back on Earth when you're ready for the next one."
  failure_text: "The recovered weapons-tech never made it to analysis."
  preconditions:
