# Phase 3: Deep cover in rebel space — meet informants, smuggle secrets.

espionage_6:
  briefing: "The officer's voice drops. 'We have an asset on Procyon Prime — deep cover, two years in. She has a package we can't move through normal channels. You'll dock at the Procyon Prime bar, look for a woman drinking alone. Codeword is \"east wind.\" Get in, get the intel, get out. This is rebel space, Commander. Procyon is a rebel capital. 25,000 credits.'"
  success_text: "The asset slides a data chit across the bar as she stands to leave. 'East wind's blowing harder every day. Tell her that.' She's gone before you can answer. 25,000 credits; the officer on Earth wants you back for debrief and the next contact."
  failure_text: "The asset's cover is blown. We lost her."
  preconditions:
    - kind: completed
      mission: espionage_5_deliver
  offer:
    kind: npc_offer
    planet: earth
    weight: 1.0
    building: bar
    approach: seek
  objective:
