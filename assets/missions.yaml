      credits: 20000

espionage_7_deliver:
  briefing: "Get the engineer's data-cartridge to Kepler-22b before rebel counter-intel tracks the leak. He gave you four units' worth of schematics — guard them."
  success_text: "Kepler's analysts look at the schematics and go quiet for a long time. 'This is half a rebel shipyard.' The officer authorizes 35,000 credits. 'We're close, Commander. One more trip into rebel space.'"
  failure_text: "The data-cartridge was lost. A life was spent for nothing."
