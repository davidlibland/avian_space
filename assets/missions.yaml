      credits: 40000

espionage_10_escape:
  briefing: "Rebel counter-intel has the whole Sirius fleet hunting you. You'll pass through the Drift on your way home — and a rebel fighter wing will be waiting. Break through. Four rebel fighters. Pick up the escort's weapons-tech from the wreckage on your way out — it's the last piece Intelligence needs."
  success_text: "Four rebel fighters, four debris fields. Five units of salvaged weapons-tech in the hold, plus the chief engineer's schematics-core. The Drift falls silent behind you. Earth is next."
  failure_text: "The intercept wing caught you in the Drift. The schematics-core is rebel property again."
