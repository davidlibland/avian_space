espionage_final:
  briefing: "Bring the schematics-core and the salvaged weapons-tech home to Earth. Federation Intelligence is waiting."
  success_text: "The officer stares at the schematics-core on her desk like it's something holy. 'Commander — we just stole the entire rebel fighter program.' A senior admiral, whose face you won't remember tomorrow, walks in and hands you a full Federation clearance: rebel-ship operational license. 'You can fly their fighters now, Commander. We built ours off of theirs. The circle closes.' 100,000 credits, the rebel ship license, and the knowledge that you're the reason the border holds."
  failure_text: "The schematics-core was lost. Years of espionage work, gone."
