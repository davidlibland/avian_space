# ══════════════════════════════════════════════════════════════════════════════
# "The Rift Awakens" — cross-faction endgame (needs the Order's exotic-lance + a
# capital-class hull). The hardest content in the game.
# ══════════════════════════════════════════════════════════════════════════════
rift_1:
  briefing: "Federation Intelligence, the Order, and the Free Frontier speak as one for the first time in history: the Rift is waking. Two Sentinels guard the way into the deep. Break them. There is no precedent for what you are about to do. 75,000."
  success_text: "The Sentinels shatter into drifting violet light. The way into the Rift is open. 75,000 credits — and silence on every comm channel."
  failure_text: "The Sentinels held. The deep stays sealed — for now."
  preconditions:
    - kind: completed
      mission: order_5
  offer:
    kind: npc_offer
    planet: threshold_watch
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: destroy_ships
    system: the_rift
    ship_type: precursor_sentinel
    count: 2
    target_name: Rift Sentinels
    hostile: true
  completion_effects:
    - kind: pay
      credits: 75000
rift_2:
  briefing: "A Harbinger — a roused hunter-form — has crossed into the Silence, burning toward the inhabited galaxy along the exotic-matter veins. If it passes, nothing the factions have will stop it. End it here. 95,000."
  success_text: "The Harbinger is unmade. The veins fall quiet. Only the sleeper remains. 95,000 credits."
  failure_text: "The Harbinger slipped past you into the dark, toward home."
  preconditions:
    - kind: completed
      mission: rift_1
  offer:
    kind: npc_offer
    planet: threshold_watch
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: destroy_ships
    system: the_silence
    ship_type: precursor_harbinger
    count: 1
    target_name: The Harbinger
    hostile: true
  completion_effects:
    - kind: pay
      credits: 95000
rift_final:
  briefing: "It is in the Seedbed, at the bottom of the deep: the Sleeper. The thing that built the ruins, that seeded the exotic matter, that the Order calls a god. It is awake now, and it is vast. Every faction you have ever flown for stands behind you. End it. 250,000 — though credits will mean little if you fail."
  success_text: "The Sleeper folds in on itself and is gone, a wound in space closing behind it. The Rift falls silent — truly silent — for the first time in millions of years. Across the galaxy, a Federation officer, a Rebel commander, a frontier harbormaster, and a robed proctor all exhale at once. You did this. 250,000 credits, and a name that outlives you."
  failure_text: "The Sleeper endures. The deep breathes out, and the veins begin to glow toward home."
  preconditions:
    - kind: completed
      mission: rift_2
  offer:
    kind: npc_offer
    planet: threshold_watch
    weight: 1.0
    building: bar
    approach: seek
  objective:
    kind: destroy_ships
    system: the_seedbed
    ship_type: precursor_sleeper
    count: 1
    target_name: The Sleeper
    hostile: true
  completion_effects:
    - kind: pay
      credits: 250000
    - kind: grant_unlock
      name: carrier_license
