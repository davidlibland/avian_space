# Recurring NPC characters for storyline missions.
#
# Loaded into ItemUniverse.npcs. Referenced from missions.yaml via `npc: <id>` on `npc_offer` offers and
# `meet_npc` / `catch_npc` objectives. The `name` becomes the conversation
# window title; `avatar` (optional) is a full character-compositor spec —
# see assets/sprites/people/layers.ron for valid slot item ids and color
# ramps. When `avatar` is omitted, a deterministic look is derived from the
# npc id (biased by `role`: civilian/guard/miner/merchant/mechanic/alien),
# so the character still appears identical everywhere.

# ── Mining Guild chain ────────────────────────────────────────────────
guild_recruiter:
  name: "Recruiter Dessa Vane"
  role: miner
  avatar:
    sex: female
    slots: { body: body, head: head_f, hair: braid, shirt: longsleeve, over: overalls_brown, legs: pants, feet: boots_brown }
    colors: { body: bronze, hair: black, eye: brown, cloth: tan }
guild_foreman:
  name: "Foreman Ada Okafor"
  role: miner
  avatar:
    sex: female
