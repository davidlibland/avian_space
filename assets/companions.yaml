# Loyal-friend companions (docs/companions_design.md, src/companions.rs).
#
# Each is granted by a mission (CompletionEffect::GrantCompanion) at the tail
# of an existing storyline. Death is permanent (the roster's fallen ledger);
# dismissal parks them at home_planet, re-recruitable there. `npc` keys into
# assets/npcs.yaml for the face and chat title; chatter keys: kill,
# player_hit, jump_in, idle.

vex_marlowe:
  name: "Vex Marlowe"
  npc: vex_marlowe
  ship_type: fed_patrol
  home_planet: kepler_22b
  temperament: aggressive
  bio: "cashiered Federation ace, flies angry"
  chatter:
    kill:
      - "Tally one. You're welcome."
      - "That's how it's done. Write it down."
    player_hit:
      - "Break left! I've got them."
      - "You fly like a freighter. Move!"
    jump_in:
      - "Still with you. Regrettably."
      - "New system, same Vex."
    idle:
      - "My old squadron patrols this lane. Wave."
      - "I outrank you, technically. I just don't care."

oak_adaora:
  name: "Okonkwo \"Oak\" Adaora"
  npc: oak_adaora
  ship_type: frontier_sailtender
  home_planet: drumlin
  temperament: protective
  bio: "Frontier homesteader who doesn't forget a kindness"
  chatter:
    kill:
      - "Won't trouble anyone again."
    player_hit:
      - "I'm between you and them. Stay behind me."
    jump_in:
      - "Right beside you. Like a fencepost."
    idle:
      - "Quiet out here. Good soil, probably."
      - "The family sends greetings. All eleven of them."

sable_dune:
  name: "Sable Dune"
  npc: sable_dune
  ship_type: rebel_gunboat
  home_planet: titan
  temperament: cautious
  bio: "smuggler paying a debt in escort-hours"
  chatter:
    kill:
      - "Ledger says that one's free."
    player_hit:
      - "We can outrun this. I vote we outrun this."
    jump_in:
      - "Customs here owes me money. Fly casual."
    idle:
      - "Every crate in my hold is legal. Today."
      - "Debt's not paid off yet. Sadly for both of us."

brother_cassian:
  name: "Brother Cassian"
  npc: brother_cassian
  ship_type: order_acolyte
  home_planet: sanctum
  temperament: protective
  bio: "excommunicated Order acolyte, serene about it"
  chatter:
    kill:
      - "May they find a quieter orbit."
    player_hit:
      - "Hold. Your hull is not yet scripture."
    jump_in:
      - "The relic hums. Or that's the reactor. Either way."
    idle:
      - "Excommunication has excellent hours."
      - "The Order watches. Let them."

tinny:
  name: "Tinny"
  npc: tinny
  ship_type: helios_drone
  home_planet: helios_prime
  temperament: aggressive
  bio: "salvaged combat drone, imprinted on your hull"
  chatter:
    kill:
      - "TARGET REDUCED TO COMPONENTS. COMPONENTS ARE FREE."
      - "EFFICIENCY: ACCEPTABLE."
    player_hit:
      - "DAMAGE DETECTED ON PRIMARY FRIEND-SHAPE. OBJECTING."
    jump_in:
      - "NEW SKY. SAME DIRECTIVE: FOLLOW."
    idle:
      - "COUNTING STARS. RECOUNTING. TOTALS DIFFER."
      - "QUERY: DO FRIEND-SHAPES DREAM. LOGGING FOR LATER."

yara_brakespear:
  name: "Capt. Yara Brakespear"
  npc: yara_brakespear
  ship_type: bastion_lance
  home_planet: iron_march
  temperament: protective
  bio: "retired Bastion lance sergeant, follows conduct not pay"
  chatter:
    kill:
      - "Line holds."
    player_hit:
      - "Shields to the front. ALWAYS to the front."
    jump_in:
      - "Formation review at your leisure. It will be poor."
    idle:
      - "Thirty years of walls. The sky is better."

# ── Wave 2: branch companions ─────────────────────────────────────────────────

chandra_vale:
  name: "Chandra Vale"
  npc: chandra_vale
  ship_type: freighter
  home_planet: tau_ceti_2
  temperament: cautious
  bio: "Guild freighter captain who counts everything twice"
  chatter:
    kill:
      - "That's coming out of somebody's margin."
    player_hit:
      - "Insurance won't cover that. Evade!"
    jump_in:
      - "Forty tons of hold and all of it yours. Don't waste it."
    idle:
      - "Ran this lane four hundred times. Never once got bored. Twice got shot."
      - "The Guild says hello. The Guild always says hello."

mirelle_ossan:
  name: "Mirelle Ossan"
  npc: mirelle_ossan
  ship_type: hauler
  home_planet: mars
  temperament: cautious
  bio: "ex-corporate logistics chief with eighty tons of spite"
  chatter:
    kill:
      - "File that under 'resolved'."
    player_hit:
      - "You're the only employer who's never docked my pay. Stay alive."
    jump_in:
      - "Hold's empty. That's money bleeding. Find us cargo."
    idle:
      - "I moved a corporation's secrets for nine years. Now I move your ore. Better."
      - "The Hand still sends me severance paperwork. I invoice them for reading it."

ismene_kore:
  name: "Dr. Ismene Kore"
  npc: ismene_kore
  ship_type: helios_enforcer
  home_planet: helios_prime
  temperament: aggressive
  bio: "solar-array physicist with strong opinions and stronger capacitors"
  chatter:
    kill:
      - "Hypothesis confirmed. They were flammable."
    player_hit:
      - "Your shield harmonics are WRONG. Hold still, I'll fix them later."
    jump_in:
      - "Local star: adequate. Company: acceptable."
    idle:
      - "I published four papers on lance optics. The pirates cited none of them."
      - "The array misses me. I can tell. It flickers."

aldous_rook:
  name: "Cmdr. Aldous Rook"
  npc: aldous_rook
  ship_type: fed_destroyer
  home_planet: earth
  temperament: protective
  bio: "decorated Federation destroyer commander, retired under protest"
  chatter:
    kill:
      - "Confirmed. Log it proper."
    player_hit:
      - "Screen formation — get behind my hull, NOW."
    jump_in:
      - "Rook on station. Fleet of two is still a fleet."
    idle:
      - "I commanded four hundred souls. You're easier to feed."
      - "Earth gave me a medal and a pension. You gave me a wing. Fair trade."

whisper:
  name: "Whisper"
  npc: whisper
  ship_type: rebel_fighter
  home_planet: deneb_prime
  temperament: aggressive
  bio: "the East Wind's quietest courier, now yours"
  chatter:
    kill:
      - "..."
      - "Done."
    player_hit:
      - "Louder than I'd like. Breaking them off you."
    jump_in:
      - "Here."
    idle:
      - "The Wind still whispers. I stopped listening. Mostly."

pip_harlan:
  name: "Pip Harlan"
  npc: pip_harlan
  ship_type: shuttle
  home_planet: earth
  temperament: cautious
  bio: "Earth dock kid with a patched shuttle and boundless faith"
  chatter:
    kill:
      - "Did we do that?! We did that!"
    player_hit:
      - "Ohno ohno — I'm distracting them! Am I helping?!"
    jump_in:
      - "First one through! Okay, second. Close second!"
    idle:
      - "When I get a real ship, I want turrets. Can shuttles have turrets? Don't answer."
      - "Mars colony still owes you for that grain, you know. I keep receipts!"

saoirse_quill:
  name: "Saoirse Quill"
  npc: saoirse_quill
  ship_type: courier
  home_planet: mars
  temperament: protective
  bio: "Mars courier who never lost a parcel, or a friend"
  chatter:
    kill:
      - "Delivery refused."
    player_hit:
      - "Package is the pilot today. Cover inbound."
    jump_in:
      - "On schedule. You're the only route I fly twice."
    idle:
      - "Eighteen units of hold, zero units lost. The streak holds."
