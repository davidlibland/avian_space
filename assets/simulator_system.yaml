# The "simulator" star system used by RL training. It is intentionally
# disconnected from the rest of the star map so it can never be reached or
# seen during normal play. Tweak this file to diversify the training
# environment without touching the gameplay galaxy in `star_systems.yaml`.
#
# Currently a copy of `sol` with no jump connections and ship counts
# inflated by ~50% to push the agent through busier engagements.

display_name: "Simulator"
map_position: [0.0, 0.0]
connections: []
planets:
  mercury:
    planet_type: rocky
    faction: Federation
    location: [120.0, 60.0]
    description: "A scorched rock barely above the sun. Iron ore practically falls out of the ground."
    radius: 20.0
    color: [0.55, 0.5, 0.45]
    commodities:
      iron: 3
      silicates: 5
      food: 65
      water: 40
    outfitter: []
