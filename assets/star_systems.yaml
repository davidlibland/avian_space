# The Marches — the no-man's-land between Federation and Bastion space. The
# only hot front of that war: both cores are fortified (kepler_22 and
# iron_march are story anchors, contestable: false), so the fighting funnels
# through here, and the contestable systems on either side (epsilon_eridani,
# coldforge) let a won buffer become a springboard deeper into enemy space.
the_marches:
  contestable: true
  map_position: [-540.0, -130.0]
  connections: [kepler_22, iron_march, epsilon_eridani, coldforge]
  planets:
    marches_freeport:
      planet_type: station
      tech_level: 1
      location: [300.0, -200.0]
      description: A hollowed-out planetoid flying no flag, wedged in the no-man's-land between Federation and Bastion space. Both militaries watch it; neither one runs it. Everything is for sale, including silence.
      radius: 24.0
      color: [0.55, 0.5, 0.45]
      commodities:
        water: 3
        oxygen: 3
        iron: 3
        silicates: 3
        food: 6
        cooling_gel: 14
        fuel_cells: 16
        electronics: 20
        gold: 24
        uranium: 36
  astroid_fields:
  - location: [-250.0, 150.0]
    number: 18
    radius: 600.0
    commodities:
      iron: 1.0

# The Barrens — the no-man's-land where Free Frontier homesteads thin out
# against Bastion's wall. Gives the Frontier a counter-front (Bastion already
# attacks drumlin directly): both sides fight for the buffer, and its two
# Frontier neighbors (drumlin, lowmark) are contestable, so a Bastion win
# here opens the push north.
