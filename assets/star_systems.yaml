      hauler: 2.0
      freighter: 1.0
      courier: 0.5
      asteroid_miner: 3.0
      rebel_fighter: 3.0        # occasional Rebel scout near the border
      rebel_gunboat: 2.0
      rebel_frigate: 1.0

