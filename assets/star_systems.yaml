# ── Federation systems (sol + left side) ───────────────────────────────────────
# Sol is the Federation capital. Left systems are Federation-controlled.
# Border systems (sol, barnard) have the occasional Rebel probe.

sol:
  map_position: [0.0, 0.0]
  connections: [tau_ceti, vega, barnard, alpha_centauri]
  planets:
    mercury:
      location: [120.0, 60.0]
      description: "A scorched rock barely above the sun. Iron ore practically falls out of the ground."
      radius: 20.0
      color: [0.55, 0.5, 0.45]
      commodities:
        iron: 3
        silicates: 5
        food: 65
        water: 40
      outfitter: []
    venus:
      location: [280.0, -200.0]
      description: "Toxic atmosphere, crushing pressure, and the cheapest food in the system."
      radius: 35.0
      color: [0.75, 0.65, 0.3]
      commodities:
        food: 15
        water: 20
        iron: 25
        chemicals: 6
      outfitter: []
    earth:
      location: [500.0, 300.0]
      description: "The Federation capital and home to its largest naval fleet. A major hub for trade and military contracts."
      radius: 60.0
      color: [0.2, 0.6, 0.3]
      commodities:
        food: 10
        water: 5
        iron: 20
        chemicals: 35
        gold: 100
      outfitter: [laser, proton_beam, ir_missile]
      shipyard: [shuttle, corvette, fighter, frigate, courier, asteroid_miner, hauler, freighter, bulk_carrier, fed_patrol, fed_destroyer, fed_missile_cruiser]
    moon:
      location: [650.0, 380.0]
      description: "Barren and grey, but surprisingly well-stocked with water ice."
      radius: 22.0
      color: [0.6, 0.6, 0.65]
      commodities:
        water: 7
        iron: 20
        food: 40
      outfitter: []
      shipyard: [shuttle, courier]
    mars:
      location: [-350.0, 400.0]
      description: "Rust-red and cold. Colonists here sell cheap iron and pay dearly for food."
      radius: 30.0
      color: [0.7, 0.35, 0.2]
      commodities:
        iron: 8
        silicates: 10
        food: 45
        water: 30
        chemicals: 18
      outfitter: []
  astroid_fields:
