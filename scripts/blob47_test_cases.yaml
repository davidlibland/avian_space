# Blob-47 auto-tile test cases — Boris The Brave's standard ordering.
# https://www.boristhebrave.com/2013/07/14/tileset-roundup/
#
# Each case is a 3x3 ASCII grid where '#' = same terrain as center,
# '.' = different terrain. The center cell is always '#' (the tile
# being evaluated). Rows are top-to-bottom: TL T TR / L X R / BL B BR.
#
# Bit assignments:  TL=1  T=2  TR=4  L=8  R=16  BL=32  B=64  BR=128
#
# After diagonal reduction (clear TL if !T or !L, etc.), the reduced
# mask indexes into the sorted-order pick_tile table to give the atlas
# column.

# --- No neighbours ---
- name: isolated
  grid: |
    ...
    .#.
    ...
  mask: 0
  column: 0

# --- Single cardinal ---
- name: top_only
  grid: |
    .#.
    .#.
    ...
  mask: 2
  column: 1

